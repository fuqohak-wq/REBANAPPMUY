<script>
  const GAS_URL = "[https://script.google.com/macros/s/AKfycbwOQrq_I95t0SA4kX_ZSRexLetuQyU7Q2uGXlC0YVk6xmdXOAj7RfjSodIoBP9sqX28uA/exec](https://script.google.com/macros/s/AKfycbwOQrq_I95t0SA4kX_ZSRexLetuQyU7Q2uGXlC0YVk6xmdXOAj7RfjSodIoBP9sqX28uA/exec)";

  // Web Audio Context Synthesizer khusus suara Rebana/Perkusi
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playRebanaSound(type, timeOffset) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const now = audioCtx.currentTime + timeOffset;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'dung') {
      // Suara Bass Rebana (Dung)
      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.3);
      gain.gain.setValueAtTime(1, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.start(now);
      osc.stop(now + 0.3);
    } else if (type === 'tak' || type === 'keprak') {
      // Suara High Percussion (Tak/Keprak)
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
      gain.gain.setValueAtTime(0.8, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      osc.start(now);
      osc.stop(now + 0.1);
    }
  }

  async function generateRebana() {
    const style = document.getElementById('styleSelect').value;
    const lyrics = document.getElementById('lyricsInput').value;
    const btn = document.getElementById('generateBtn');
    const loading = document.getElementById('loading');
    const resultArea = document.getElementById('resultArea');

    btn.disabled = true;
    btn.classList.add('opacity-50');
    loading.classList.remove('hidden');
    resultArea.classList.add('hidden');

    try {
      if (audioCtx.state === 'suspended') {
        await audioCtx.resume();
      }

      // 1. Minta komposisi ketukan dari Gemini via Vercel
      const response = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ style, lyrics })
      });

      if (!response.ok) {
        const errData = await response.json();
        throw new Error(errData.error || 'Gagal memproses AI');
      }

      const patternData = await response.json();

      // 2. Bunyikan urutan ketukan perkusi di browser
      if (patternData.sequence && Array.isArray(patternData.sequence)) {
        patternData.sequence.forEach(item => {
          playRebanaSound(item.sound, item.time);
        });
      }

      resultArea.classList.remove('hidden');

      // 3. Log ke GAS
      if (GAS_URL) {
        fetch(GAS_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ style, lyrics })
        }).catch(e => console.log("GAS Log Error:", e));
      }

    } catch (err) {
      alert("Error: " + err.message);
    } finally {
      btn.disabled = false;
      btn.classList.remove('opacity-50');
      loading.classList.add('hidden');
    }
  }
</script>
