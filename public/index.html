<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Music Video Creator (Bypass Vercel Payload Limit)</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --success: #10b981;
      --success-hover: #059669;
      --text: #f8fafc;
      --subtext: #94a3b8;
      --border: #334155;
    }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .container {
      max-width: 850px;
      width: 100%;
      background: var(--card);
      padding: 28px;
      border-radius: 20px;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
      border: 1px solid var(--border);
    }
    h1 { text-align: center; color: #818cf8; margin: 0 0 8px 0; font-size: 1.8rem; }
    p.subtitle { text-align: center; color: var(--subtext); margin-top: 0; margin-bottom: 24px; font-size: 0.95rem; }
    .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 640px) { .grid-form { grid-template-columns: 1fr; } }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; color: #cbd5e1; }
    input, select, button {
      width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border);
      background: #0f172a; color: var(--text); box-sizing: border-box; font-size: 0.95rem; outline: none;
    }
    button { background: var(--accent); color: white; font-weight: 600; border: none; cursor: pointer; margin-top: 10px; }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    button.download-btn { background: var(--success); }
    button.download-btn:hover:not(:disabled) { background: var(--success-hover); }
    .preview-zone { display: flex; flex-direction: column; align-items: center; margin-top: 24px; background: #090d16; padding: 16px; border-radius: 12px; }
    canvas { background: #000; border-radius: 8px; max-width: 100%; height: auto; max-height: 480px; }
    .status-box { margin-top: 12px; padding: 10px 16px; background: #1e293b; border-radius: 8px; font-size: 0.88rem; color: #38bdf8; text-align: center; width: 100%; border-left: 4px solid #38bdf8; }
  </style>
</head>
<body>

<div class="container">
  <h1>🎬 AI Music Video Creator</h1>
  <p class="subtitle">Otomatisasi Lirik Gemini 2.5 Flash (Ultra-Light Audio Compression)</p>

  <div class="grid-form">
    <div class="form-group">
      <label for="audioInput">1. File Audio MP3:</label>
      <input type="file" id="audioInput" accept="audio/*">
    </div>

    <div class="form-group">
      <label for="imageInput">2. Foto Pendukung (Multi-select):</label>
      <input type="file" id="imageInput" accept="image/*" multiple>
    </div>

    <div class="form-group">
      <label for="aspectRatio">3. Format Video:</label>
      <select id="aspectRatio">
        <option value="16:9">Memanjang / Landscape 16:9 (YouTube)</option>
        <option value="9:16">Meninggi / Portrait 9:16 (Shorts / TikTok / Reels)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="videoFormat">4. Format Output:</label>
      <select id="videoFormat"></select>
    </div>
  </div>

  <button id="processBtn">✨ 1. Kompres Audio & Analisis AI</button>
  <button id="renderBtn" disabled>▶️ 2. Putar & Rekam Video Canvas</button>
  <button id="downloadBtn" class="download-btn" disabled>💾 3. Unduh Video Siap Upload</button>

  <div class="status-box" id="statusText">Status: Pilih file audio MP3 Anda.</div>

  <div class="preview-zone">
    <canvas id="videoCanvas"></canvas>
  </div>
</div>

<script>
  let rawAudioBuffer = null;
  let audioContext = null;
  let audioSource = null;
  let analyser = null;
  let lyricsData = [];
  let userImages = [];
  let mediaRecorder = null;
  let recordedChunks = [];
  let selectedMimeType = '';

  const canvas = document.getElementById('videoCanvas');
  const ctx = canvas.getContext('2d');
  const statusText = document.getElementById('statusText');
  const formatSelect = document.getElementById('videoFormat');

  function detectSupportedFormats() {
    formatSelect.innerHTML = '';
    const formats = [
      { mime: 'video/mp4;codecs=avc1.42E01E,mp4a.40.2', ext: 'mp4', label: 'MP4 (Siap Sosmed)' },
      { mime: 'video/mp4', ext: 'mp4', label: 'MP4 Standard' },
      { mime: 'video/webm;codecs=vp9,opus', ext: 'webm', label: 'WEBM (Sangat Jernih)' },
      { mime: 'video/webm', ext: 'webm', label: 'WEBM Standard' }
    ];

    formats.forEach(item => {
      if (MediaRecorder.isTypeSupported(item.mime)) {
        const opt = document.createElement('option');
        opt.value = item.mime;
        opt.dataset.ext = item.ext;
        opt.textContent = item.label;
        formatSelect.appendChild(opt);
      }
    });
    if (formatSelect.options.length > 0) selectedMimeType = formatSelect.value;
  }
  detectSupportedFormats();

  function updateCanvasDimensions() {
    const ratio = document.getElementById('aspectRatio').value;
    canvas.width = ratio === '16:9' ? 1280 : 720;
    canvas.height = ratio === '16:9' ? 720 : 1280;
  }
  document.getElementById('aspectRatio').addEventListener('change', updateCanvasDimensions);
  updateCanvasDimensions();

  document.getElementById('imageInput').addEventListener('change', (e) => {
    userImages = [];
    for (let file of e.target.files) {
      const img = new Image();
      img.src = URL.createObjectURL(file);
      userImages.push(img);
    }
  });

  // Kompres Audio Super Ringan Khusus Pengiriman ke Gemini AI (12kHz Mono WAV)
  async function compressAudioForGemini(audioBuffer) {
    const targetSampleRate = 12000;
    const offlineCtx = new OfflineAudioContext(1, Math.ceil(audioBuffer.duration * targetSampleRate), targetSampleRate);
    const source = offlineCtx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(offlineCtx.destination);
    source.start();

    const renderedBuffer = await offlineCtx.startRendering();
    
    // Konversi float channel data ke 8-bit PCM (Menghemat ukuran hingga 75%)
    const channelData = renderedBuffer.getChannelData(0);
    const bufferLength = channelData.length;
    const wavHeaderBuffer = new ArrayBuffer(44 + bufferLength);
    const view = new DataView(wavHeaderBuffer);

    function writeString(offset, string) {
      for (let i = 0; i < string.length; i++) {
        view.setUint8(offset + i, string.charCodeAt(i));
      }
    }

    writeString(0, 'RIFF');
    view.setUint32(4, 36 + bufferLength, true);
    writeString(8, 'WAVE');
    writeString(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true); // PCM
    view.setUint16(22, 1, true); // Mono
    view.setUint32(24, targetSampleRate, true);
    view.setUint32(28, targetSampleRate, true); // Byte rate
    view.setUint16(32, 1, true); // Block align
    view.setUint16(34, 8, true); // 8-bit
    writeString(36, 'data');
    view.setUint32(40, bufferLength, true);

    // Convert float -1.0 .. 1.0 to uint8 0 .. 255
    let offset = 44;
    for (let i = 0; i < bufferLength; i++) {
      let s = Math.max(-1, Math.min(1, channelData[i]));
      view.setUint8(offset++, (s + 1) * 127.5);
    }

    const wavBlob = new Blob([view], { type: 'audio/wav' });

    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result.split(',')[1]);
      reader.readAsDataURL(wavBlob);
    });
  }

  // Process Click
  document.getElementById('processBtn').addEventListener('click', async () => {
    const audioFile = document.getElementById('audioInput').files[0];
    if (!audioFile) return alert("Pilih file audio terlebih dahulu!");

    statusText.innerText = "⚡ 1/2 Mengompres ukuran audio agar muat di server Vercel...";

    try {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const arrayBuffer = await audioFile.arrayBuffer();
      rawAudioBuffer = await audioContext.decodeAudioData(arrayBuffer);

      // Kompres audio secara otomatis
      const base64LightAudio = await compressAudioForGemini(rawAudioBuffer);

      statusText.innerText = "⏳ 2/2 Memproses lirik dengan Gemini 2.5 Flash...";

      const response = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          base64Audio: base64LightAudio,
          mimeType: 'audio/wav'
        })
      });

      const textRes = await response.text();
      let data;
      try {
        data = JSON.parse(textRes);
      } catch (e) {
        throw new Error("Pesan dari Server: " + textRes);
      }

      if (!response.ok) throw new Error(data.error || 'Gagal merespon dari server');

      let rawText = data.candidates[0].content.parts[0].text;
      rawText = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
      lyricsData = JSON.parse(rawText);

      statusText.innerText = `✅ Berhasil! Ditemukan ${lyricsData.length} baris lirik. Siap diputar & direkam.`;
      document.getElementById('renderBtn').disabled = false;

    } catch (err) {
      console.error(err);
      statusText.innerText = "❌ Error: " + err.message;
    }
  });

  // Render Loop
  let startTime = 0;
  let isPlaying = false;

  function renderFrame() {
    if (!isPlaying) return;

    const currentTime = audioContext.currentTime - startTime;
    if (currentTime > rawAudioBuffer.duration) {
      isPlaying = false;
      statusText.innerText = "🎉 Selesai merekam video! Klik 'Unduh Video'.";
      document.getElementById('downloadBtn').disabled = false;
      if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
      return;
    }

    ctx.fillStyle = '#0f172a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (userImages.length > 0) {
      const imgIndex = Math.floor(currentTime / 4) % userImages.length;
      const img = userImages[imgIndex];
      if (img.complete) {
        const progress = (currentTime % 4) / 4;
        const scale = 1 + (progress * 0.08);
        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.scale(scale, scale);
        ctx.globalAlpha = 0.65;
        ctx.drawImage(img, -canvas.width/2, -canvas.height/2, canvas.width, canvas.height);
        ctx.restore();
      }
    }

    if (analyser) {
      const freqData = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(freqData);
      ctx.fillStyle = 'rgba(99, 102, 241, 0.4)';
      const barWidth = (canvas.width / freqData.length) * 2;
      let x = 0;
      for (let i = 0; i < freqData.length; i++) {
        const barHeight = (freqData[i] / 255) * (canvas.height * 0.22);
        ctx.fillRect(x, canvas.height - barHeight, barWidth - 1, barHeight);
        x += barWidth;
      }
    }

    const currentLyric = lyricsData.find(l => currentTime >= l.start && currentTime <= l.end);
    if (currentLyric) {
      ctx.fillStyle = '#ffffff';
      ctx.shadowColor = '#6366f1';
      ctx.shadowBlur = 16;
      ctx.font = `bold ${canvas.width * 0.048}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(currentLyric.text, canvas.width / 2, canvas.height * 0.75);
    }

    requestAnimationFrame(renderFrame);
  }

  // Start Play & Record
  document.getElementById('renderBtn').addEventListener('click', () => {
    if (!rawAudioBuffer) return;

    audioSource = audioContext.createBufferSource();
    audioSource.buffer = rawAudioBuffer;

    analyser = audioContext.createAnalyser();
    analyser.fftSize = 128;

    const dest = audioContext.createMediaStreamDestination();
    audioSource.connect(analyser);
    analyser.connect(audioContext.destination);
    analyser.connect(dest);

    const canvasStream = canvas.captureStream(30);
    const combinedStream = new MediaStream([
      ...canvasStream.getVideoTracks(),
      ...dest.stream.getAudioTracks()
    ]);

    recordedChunks = [];
    const options = formatSelect.value ? { mimeType: formatSelect.value } : {};
    try {
      mediaRecorder = new MediaRecorder(combinedStream, options);
    } catch (e) {
      mediaRecorder = new MediaRecorder(combinedStream);
    }

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.start();
    audioSource.start(0);
    startTime = audioContext.currentTime;
    isPlaying = true;

    statusText.innerText = "⏺️ Merekam video... Tunggu hingga lagu selesai.";
    renderFrame();
  });

  // Download
  document.getElementById('downloadBtn').addEventListener('click', () => {
    const selectedOpt = formatSelect.options[formatSelect.selectedIndex];
    const ext = selectedOpt ? selectedOpt.dataset.ext : 'mp4';
    const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'video/mp4' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `music-video-${document.getElementById('aspectRatio').value.replace(':','-')}.${ext}`;
    a.click();
  });
</script>

</body>
</html>
