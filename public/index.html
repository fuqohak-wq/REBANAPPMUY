<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Music Video Creator (Live Animated Particles)</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --success: #10b981;
      --success-hover: #059669;
      --text: #f8fafc;
      --subtext: #94a3b8;
      --border: #334155;
    }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .container {
      max-width: 850px;
      width: 100%;
      background: var(--card);
      padding: 28px;
      border-radius: 20px;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
      border: 1px solid var(--border);
    }
    h1 { text-align: center; color: #818cf8; margin: 0 0 8px 0; font-size: 1.8rem; }
    p.subtitle { text-align: center; color: var(--subtext); margin-top: 0; margin-bottom: 24px; font-size: 0.95rem; }
    .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 640px) { .grid-form { grid-template-columns: 1fr; } }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; color: #cbd5e1; }
    input, select, button {
      width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border);
      background: #0f172a; color: var(--text); box-sizing: border-box; font-size: 0.95rem; outline: none;
    }
    button { background: var(--accent); color: white; font-weight: 600; border: none; cursor: pointer; margin-top: 10px; }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    button.download-btn { background: var(--success); }
    button.download-btn:hover:not(:disabled) { background: var(--success-hover); }
    .preview-zone { display: flex; flex-direction: column; align-items: center; margin-top: 24px; background: #090d16; padding: 16px; border-radius: 12px; }
    canvas { background: #000; border-radius: 8px; max-width: 100%; height: auto; max-height: 480px; }
    .status-box { margin-top: 12px; padding: 10px 16px; background: #1e293b; border-radius: 8px; font-size: 0.88rem; color: #38bdf8; text-align: center; width: 100%; border-left: 4px solid #38bdf8; }
  </style>
</head>
<body>

<div class="container">
  <h1>🎬 AI Music Video Creator</h1>
  <p class="subtitle">Cloudinary Integration & Live Particle Effects</p>

  <div class="grid-form">
    <div class="form-group">
      <label for="audioInput">1. File Audio MP3:</label>
      <input type="file" id="audioInput" accept="audio/*">
    </div>

    <div class="form-group">
      <label for="imageInput">2. Foto Pendukung (Multi-select):</label>
      <input type="file" id="imageInput" accept="image/*" multiple>
    </div>

    <div class="form-group">
      <label for="aspectRatio">3. Format Video:</label>
      <select id="aspectRatio">
        <option value="16:9">Memanjang / Landscape 16:9 (YouTube)</option>
        <option value="9:16">Meninggi / Portrait 9:16 (Shorts / TikTok / Reels)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="videoFormat">4. Format Output:</label>
      <select id="videoFormat"></select>
    </div>
  </div>

  <button id="processBtn">✨ 1. Analisis Lirik via AI</button>
  <button id="renderBtn" disabled>▶️ 2. Putar & Rekam Video Canvas</button>
  <button id="downloadBtn" class="download-btn" disabled>💾 3. Unduh Video Siap Upload</button>

  <div class="status-box" id="statusText">Status: Silakan pilih file audio MP3 Anda.</div>

  <div class="preview-zone">
    <canvas id="videoCanvas"></canvas>
  </div>
</div>

<script>
  // ⚙️ GANTI DENGAN KREDENSIAL CLOUDINARY MILIKMU!
  const CLOUDINARY_CLOUD_NAME = 'wkfml1bp'; 
  const CLOUDINARY_PRESET = 'music_preset';

  let rawAudioBuffer = null;
  let audioContext = null;
  let audioSource = null;
  let analyser = null;
  let lyricsData = [];
  let userImages = [];
  let mediaRecorder = null;
  let recordedChunks = [];

  const canvas = document.getElementById('videoCanvas');
  const ctx = canvas.getContext('2d');
  const statusText = document.getElementById('statusText');
  const formatSelect = document.getElementById('videoFormat');

  // --- SISTEM PARTIKEL HIDUP (HUJAN & PERCIKAN CAHAYA) ---
  const particles = [];
  const particleCount = 70;

  function initParticles() {
    particles.length = 0;
    for (let i = 0; i < particleCount; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        length: 8 + Math.random() * 12,    // Panjang garis rintik hujan
        speedY: 3 + Math.random() * 5,    // Kecepatan jatuh
        speedX: -0.8 + Math.random() * 1.6,// Tiupan angin
        opacity: 0.15 + Math.random() * 0.5,
        size: 1 + Math.random() * 2        // Untuk kilauan
      });
    }
  }

  function drawAtmosphericParticles() {
    ctx.save();
    
    // 1. Gambar Rintik Hujan
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.lineWidth = 1.2;

    for (let p of particles) {
      ctx.beginPath();
      ctx.globalAlpha = p.opacity;
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + p.speedX, p.y + p.length);
      ctx.stroke();

      // 2. Gambar Percikan Cahaya / Sparkles Melayang
      ctx.fillStyle = '#6366f1';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();

      // Update Pergerakan
      p.y += p.speedY;
      p.x += p.speedX;

      // Loop ulang jika partikel keluar dari canvas
      if (p.y > canvas.height) {
        p.y = -15;
        p.x = Math.random() * canvas.width;
      }
    }
    
    ctx.restore();
  }

  function detectSupportedFormats() {
    formatSelect.innerHTML = '';
    const formats = [
      { mime: 'video/mp4;codecs=avc1.42E01E,mp4a.40.2', ext: 'mp4', label: 'MP4 (Siap Sosmed)' },
      { mime: 'video/mp4', ext: 'mp4', label: 'MP4 Standard' },
      { mime: 'video/webm;codecs=vp9,opus', ext: 'webm', label: 'WEBM (Jernih)' },
      { mime: 'video/webm', ext: 'webm', label: 'WEBM Standard' }
    ];

    formats.forEach(item => {
      if (MediaRecorder.isTypeSupported(item.mime)) {
        const opt = document.createElement('option');
        opt.value = item.mime;
        opt.dataset.ext = item.ext;
        opt.textContent = item.label;
        formatSelect.appendChild(opt);
      }
    });
  }
  detectSupportedFormats();

  function updateCanvasDimensions() {
    const ratio = document.getElementById('aspectRatio').value;
    canvas.width = ratio === '16:9' ? 1280 : 720;
    canvas.height = ratio === '16:9' ? 720 : 1280;
    initParticles();
  }
  document.getElementById('aspectRatio').addEventListener('change', updateCanvasDimensions);
  updateCanvasDimensions();

  document.getElementById('imageInput').addEventListener('change', (e) => {
    userImages = [];
    for (let file of e.target.files) {
      const img = new Image();
      img.src = URL.createObjectURL(file);
      userImages.push(img);
    }
  });

  // Proses Utama Analisis Audio
  document.getElementById('processBtn').addEventListener('click', async () => {
    const audioFile = document.getElementById('audioInput').files[0];
    if (!audioFile) return alert("Pilih file audio MP3 terlebih dahulu!");

    try {
      statusText.innerText = "⚡ 1/3 Mengunggah MP3 langsung ke Cloud Storage...";
      
      const formData = new FormData();
      formData.append('file', audioFile);
      formData.append('upload_preset', CLOUDINARY_PRESET);

      const cloudRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/video/upload`, {
        method: 'POST',
        body: formData
      });

      const cloudData = await cloudRes.json();
      if (!cloudRes.ok) throw new Error(cloudData.error?.message || "Gagal upload ke Cloudinary");

      const audioUrl = cloudData.secure_url;
      const publicId = cloudData.public_id;

      statusText.innerText = "⏳ 2/3 Gemini AI sedang mengekstrak lirik & presisi timestamp...";
      const analyzeRes = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          audioUrl: audioUrl,
          publicId: publicId
        })
      });

      const analyzeData = await analyzeRes.json();
      if (!analyzeRes.ok) throw new Error(analyzeData.error || 'Gagal analisis lirik');

      let rawText = analyzeData.candidates[0].content.parts[0].text;
      rawText = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
      lyricsData = JSON.parse(rawText);

      statusText.innerText = "🔊 3/3 Memuat player lokal...";
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const arrayBuffer = await audioFile.arrayBuffer();
      rawAudioBuffer = await audioContext.decodeAudioData(arrayBuffer);

      statusText.innerText = `✅ Berhasil! ${lyricsData.length} baris lirik terdeteksi presisi. Siap Diputar & Direkam!`;
      document.getElementById('renderBtn').disabled = false;

    } catch (err) {
      console.error(err);
      statusText.innerText = "❌ Error: " + err.message;
    }
  });

  // Render Loop dengan Animasi Partikel + Smooth Zooming Background
  let startTime = 0;
  let isPlaying = false;

  function renderFrame() {
    if (!isPlaying) return;

    const currentTime = audioContext.currentTime - startTime;
    if (currentTime > rawAudioBuffer.duration) {
      isPlaying = false;
      statusText.innerText = "🎉 Selesai merekam video! Klik 'Unduh Video'.";
      document.getElementById('downloadBtn').disabled = false;
      if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
      return;
    }

    // Background dasar
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Render Foto dengan Ken Burns / Subtle Zoom Effect
    if (userImages.length > 0) {
      const imgIndex = Math.floor(currentTime / 5) % userImages.length;
      const img = userImages[imgIndex];
      if (img.complete) {
        const progress = (currentTime % 5) / 5;
        const scale = 1 + (progress * 0.06); // Efek zoom lambat yang halus
        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.scale(scale, scale);
        ctx.globalAlpha = 0.75; // Gelapkan sedikit foto agar lirik dan partikel menonjol
        ctx.drawImage(img, -canvas.width/2, -canvas.height/2, canvas.width, canvas.height);
        ctx.restore();
      }
    }

    // GAMBAR EFEK ANIMASI HUJAN & SPARKLES HIDUP
    drawAtmosphericParticles();

    // Visualizer Musik Spektrum di bagian bawah
    if (analyser) {
      const freqData = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(freqData);
      ctx.fillStyle = 'rgba(99, 102, 241, 0.45)';
      const barWidth = (canvas.width / freqData.length) * 2;
      let x = 0;
      for (let i = 0; i < freqData.length; i++) {
        const barHeight = (freqData[i] / 255) * (canvas.height * 0.18);
        ctx.fillRect(x, canvas.height - barHeight, barWidth - 1, barHeight);
        x += barWidth;
      }
    }

    // Render Lirik yang Bertenaga & Timbul
    const currentLyric = lyricsData.find(l => currentTime >= l.start && currentTime <= l.end);
    if (currentLyric) {
      ctx.save();
      // Kotak latar tipis di belakang lirik agar mudah dibaca
      ctx.fillStyle = 'rgba(15, 23, 42, 0.65)';
      const fontSize = Math.floor(canvas.width * 0.045);
      ctx.font = `bold ${fontSize}px sans-serif`;
      const textWidth = ctx.measureText(currentLyric.text).width;
      ctx.fillRect((canvas.width - textWidth) / 2 - 20, canvas.height * 0.73 - fontSize, textWidth + 40, fontSize + 24);

      // Teks Lirik Glow
      ctx.fillStyle = '#ffffff';
      ctx.shadowColor = '#818cf8';
      ctx.shadowBlur = 18;
      ctx.textAlign = 'center';
      ctx.fillText(currentLyric.text, canvas.width / 2, canvas.height * 0.73);
      ctx.restore();
    }

    requestAnimationFrame(renderFrame);
  }

  // Play & Record
  document.getElementById('renderBtn').addEventListener('click', () => {
    if (!rawAudioBuffer) return;

    audioSource = audioContext.createBufferSource();
    audioSource.buffer = rawAudioBuffer;

    analyser = audioContext.createAnalyser();
    analyser.fftSize = 128;

    const dest = audioContext.createMediaStreamDestination();
    audioSource.connect(analyser);
    analyser.connect(audioContext.destination);
    analyser.connect(dest);

    const canvasStream = canvas.captureStream(30);
    const combinedStream = new MediaStream([
      ...canvasStream.getVideoTracks(),
      ...dest.stream.getAudioTracks()
    ]);

    recordedChunks = [];
    const options = formatSelect.value ? { mimeType: formatSelect.value } : {};
    try {
      mediaRecorder = new MediaRecorder(combinedStream, options);
    } catch (e) {
      mediaRecorder = new MediaRecorder(combinedStream);
    }

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.start();
    audioSource.start(0);
    startTime = audioContext.currentTime;
    isPlaying = true;

    statusText.innerText = "⏺️ Merekam video... Mohon biarkan tab ini TETAP AKTIF hingga lagu selesai.";
    renderFrame();
  });

  // Download Video
  document.getElementById('downloadBtn').addEventListener('click', () => {
    const selectedOpt = formatSelect.options[formatSelect.selectedIndex];
    const ext = selectedOpt ? selectedOpt.dataset.ext : 'mp4';
    const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'video/mp4' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `music-video-${document.getElementById('aspectRatio').value.replace(':','-')}.${ext}`;
    a.click();
  });
</script>

</body>
</html>
