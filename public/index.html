<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Rebana Generator (5-Min Player)</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

  <div class="max-w-xl w-full bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-2xl">
    <!-- Header -->
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold text-emerald-400">🥁 AI Rebana Generator</h1>
      <p class="text-slate-400 text-sm mt-1">Iringan Perkusi Hadroh & Rebana Murni (Bisa Diputar 5+ Menit Non-Stop)</p>
    </div>

    <!-- Form -->
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1 text-slate-300">Pilih Gaya Ketukan Rebana:</label>
        <select id="styleSelect" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-slate-200 focus:outline-none focus:border-emerald-500">
          <option value="banjari">Hadroh Banjari (Cepat & Energetik)</option>
          <option value="habibi">Habibi / Duff Rhythm (Sedang)</option>
          <option value="slow">Hadroh Pelan / Meditatif (Slow Beat)</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1 text-slate-300">Target Durasi Putar:</label>
        <select id="durationSelect" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-slate-200 focus:outline-none focus:border-emerald-500">
          <option value="60">1 Menit</option>
          <option value="180">3 Menit</option>
          <option value="300" selected>5 Menit (Standar Sholawat)</option>
          <option value="600">10 Menit</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1 text-slate-300">Lirik / Catatan (Opsional):</label>
        <textarea id="lyricsInput" rows="2" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-slate-200 focus:outline-none focus:border-emerald-500" placeholder="Masukkan lirik sholawat..."></textarea>
      </div>

      <button id="generateBtn" onclick="generateAndPlay()" class="w-full bg-emerald-600 hover:bg-emerald-500 font-bold py-3 rounded-lg transition duration-200 flex justify-center items-center gap-2 shadow-lg shadow-emerald-900/40">
        <span>▶️ Buat & Putar Irama Rebana</span>
      </button>
    </div>

    <!-- Player Controls -->
    <div id="playerArea" class="hidden mt-6 p-5 bg-slate-900 rounded-xl border border-emerald-500/40 text-center space-y-3">
      <div class="flex items-center justify-between">
        <span class="text-xs font-semibold text-emerald-400" id="statusLabel">🔴 Memutar Irama...</span>
        <span class="text-xs text-slate-400" id="timeLabel">00:00 / 05:00</span>
      </div>

      <p id="patternTitle" class="text-sm font-bold text-slate-200"></p>

      <div class="flex gap-2 justify-center pt-2">
        <button onclick="stopAudio()" class="bg-rose-600 hover:bg-rose-500 text-white text-sm px-6 py-2 rounded-lg font-bold transition">
          ⏹️ Stop
        </button>
      </div>
    </div>
  </div>

  <script>
    let audioCtx;
    let isPlaying = false;
    let loopInterval;
    let timerInterval;
    let currentSeconds = 0;
    let maxSeconds = 300;

    function playRebanaSound(type, timeOffset) {
      if (!audioCtx || !isPlaying) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const now = audioCtx.currentTime + timeOffset;

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'dung') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(140, now);
        osc.frequency.exponentialRampToValueAtTime(35, now + 0.3);
        gain.gain.setValueAtTime(1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.3);
      } else {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(550, now);
        osc.frequency.exponentialRampToValueAtTime(180, now + 0.1);
        gain.gain.setValueAtTime(0.7, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
      }
    }

    function startLooping(sequence, durationInSeconds) {
      stopAudio(); // Reset player

      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      isPlaying = true;
      maxSeconds = durationInSeconds;
      currentSeconds = 0;

      // Hitung total durasi 1 siklus pola
      const lastItem = sequence[sequence.length - 1];
      const patternLength = (lastItem ? lastItem.time : 2) + 0.5;

      // Fungsi pemutar 1 siklus
      const playCycle = () => {
        if (!isPlaying) return;
        sequence.forEach(item => {
          playRebanaSound(item.sound, item.time);
        });
      };

      // Jalankan siklus pertama & set interval perulangan
      playCycle();
      loopInterval = setInterval(playCycle, patternLength * 1000);

      // Timer durasi
      updateTimerDisplay();
      timerInterval = setInterval(() => {
        currentSeconds++;
        updateTimerDisplay();

        if (currentSeconds >= maxSeconds) {
          stopAudio();
          alert("Durasi pemutaran irama rebana telah selesai!");
        }
      }, 1000);

      document.getElementById('playerArea').classList.remove('hidden');
    }

    function stopAudio() {
      isPlaying = false;
      if (loopInterval) clearInterval(loopInterval);
      if (timerInterval) clearInterval(timerInterval);
      if (audioCtx) audioCtx.close();
      document.getElementById('playerArea').classList.add('hidden');
    }

    function updateTimerDisplay() {
      const curMin = String(Math.floor(currentSeconds / 60)).padStart(2, '0');
      const curSec = String(currentSeconds % 60).padStart(2, '0');
      const maxMin = String(Math.floor(maxSeconds / 60)).padStart(2, '0');
      const maxSec = String(maxSeconds % 60).padStart(2, '0');

      document.getElementById('timeLabel').innerText = `${curMin}:${curSec} / ${maxMin}:${maxSec}`;
    }

    async function generateAndPlay() {
      const style = document.getElementById('styleSelect').value;
      const lyrics = document.getElementById('lyricsInput').value;
      const duration = parseInt(document.getElementById('durationSelect').value);
      const btn = document.getElementById('generateBtn');

      btn.disabled = true;
      btn.innerText = "Processing...";

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ style, lyrics })
        });

        const patternData = await response.json();
        document.getElementById('patternTitle').innerText = patternData.pattern_name || "Pola Rebana Hadroh";

        // Mulai memutar suara looping selama durasi yang dipilih
        startLooping(patternData.sequence, duration);

      } catch (err) {
        alert("Gagal memproses irama: " + err.message);
      } finally {
        btn.disabled = false;
        btn.innerText = "▶️ Buat & Putar Irama Rebana";
      }
    }
  </script>
</body>
</html>
