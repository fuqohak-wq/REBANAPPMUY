<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Music Video Creator (Whisper GPU & FFmpeg Engine)</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --success: #10b981;
      --success-hover: #059669;
      --text: #f8fafc;
      --subtext: #94a3b8;
      --border: #334155;
    }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .container {
      max-width: 650px;
      width: 100%;
      background: var(--card);
      padding: 28px;
      border-radius: 20px;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
      border: 1px solid var(--border);
    }
    h1 { text-align: center; color: #818cf8; margin: 0 0 8px 0; font-size: 1.8rem; }
    p.subtitle { text-align: center; color: var(--subtext); margin-top: 0; margin-bottom: 24px; font-size: 0.95rem; }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; color: #cbd5e1; }
    input, button {
      width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border);
      background: #0f172a; color: var(--text); box-sizing: border-box; font-size: 0.95rem; outline: none;
    }
    button { background: var(--accent); color: white; font-weight: 600; border: none; cursor: pointer; margin-top: 10px; }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    button.download-btn { background: var(--success); }
    button.download-btn:hover:not(:disabled) { background: var(--success-hover); }
    .status-box { margin-top: 20px; padding: 14px 16px; background: #0f172a; border-radius: 10px; font-size: 0.9rem; color: #38bdf8; text-align: center; border-left: 4px solid #38bdf8; }
    .info-badge { background: rgba(99, 102, 241, 0.15); color: #818cf8; padding: 12px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 16px; text-align: center; line-height: 1.4; }
  </style>
</head>
<body>

<div class="container">
  <h1>🎬 AI Music Video Creator</h1>
  <p class="subtitle">Google Colab GPU + OpenAI Whisper + FFmpeg Engine</p>

  <div class="info-badge">
    ⚡ <b>Ditenagai Server GPU Colab:</b> Proses transkripsi lirik & rendering dilakukan di Cloud. Setelah klik Start, <b>kamu bebas menutup tab/browser ini dan ditinggal tidur!</b>
  </div>

  <div class="form-group">
    <label for="audioInput">1. File Audio MP3 (Bebas Berapapun Durasinya):</label>
    <input type="file" id="audioInput" accept="audio/*">
  </div>

  <div class="form-group">
    <label for="imageInput">2. Foto Poster / Background Video:</label>
    <input type="file" id="imageInput" accept="image/*">
  </div>

  <button id="startBtn">🚀 Buat Video MP3 & Lirik di Background</button>
  <button id="downloadBtn" class="download-btn" style="display: none;">💾 Unduh Video MP4 Selesai</button>

  <div class="status-box" id="statusText">Status: Siap memproses video.</div>
</div>

<script>
  // URL SERVER COLAB DARI SCREENSHOT KAMU
  const COLAB_BACKEND_URL = "https://dry-otters-tan.loca.lt"; 

  let currentJobId = null;
  let checkInterval = null;

  const statusText = document.getElementById('statusText');
  const startBtn = document.getElementById('startBtn');
  const downloadBtn = document.getElementById('downloadBtn');

  document.getElementById('startBtn').addEventListener('click', async () => {
    const audioFile = document.getElementById('audioInput').files[0];
    const imageFile = document.getElementById('imageInput').files[0];

    if (!audioFile || !imageFile) {
      return alert("Pilih file Audio MP3 dan Gambar Poster terlebih dahulu!");
    }

    try {
      startBtn.disabled = true;
      statusText.innerText = "⏳ Mengunggah MP3 & Gambar ke Server Colab GPU...";

      const formData = new FormData();
      formData.append('audio', audioFile);
      formData.append('image', imageFile);

      const res = await fetch(`${COLAB_BACKEND_URL}/generate-video`, {
        method: 'POST',
        headers: {
          'Bypass-Tunnel-Remainder': 'true'
        },
        body: formData
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.message || "Gagal menghubungi server Colab");

      currentJobId = data.job_id;
      statusText.innerText = "🚀 Pemrosesan dimulai! Whisper AI sedang mengekstrak lirik. Kamu bebas menutup tab ini sekarang.";

      checkInterval = setInterval(checkStatus, 5000);

    } catch (err) {
      console.error(err);
      statusText.innerText = "❌ Error: " + err.message;
      startBtn.disabled = false;
    }
  });

  async function checkStatus() {
    if (!currentJobId) return;

    try {
      const res = await fetch(`${COLAB_BACKEND_URL}/status/${currentJobId}`, {
        headers: { 'Bypass-Tunnel-Remainder': 'true' }
      });
      const data = await res.json();

      statusText.innerText = `🔄 [Status Server]: ${data.message}`;

      if (data.status === 'completed') {
        clearInterval(checkInterval);
        statusText.innerText = "🎉 Video selesai diproses 100%! Klik tombol di bawah untuk mengunduh.";
        downloadBtn.style.display = "block";
        downloadBtn.onclick = () => {
          window.location.href = `${COLAB_BACKEND_URL}${data.download_url}`;
        };
      } else if (data.status === 'failed') {
        clearInterval(checkInterval);
        startBtn.disabled = false;
      }
    } catch (e) {
      console.error("Gagal cek status:", e);
    }
  }
</script>

</body>
</html>
