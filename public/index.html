<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Rebana Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

  <div class="max-w-xl w-full bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-2xl">
    <!-- Header -->
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold text-emerald-400">🥁 AI Rebana Generator</h1>
      <p class="text-slate-400 text-sm mt-1">Pembuat iringan perkusi Hadroh & Rebana murni berbasis Gemini AI (Bebas Alat Musik Haram)</p>
    </div>

    <!-- Form -->
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1 text-slate-300">Pilih Gaya Ketukan Rebana:</label>
        <select id="styleSelect" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-slate-200 focus:outline-none focus:border-emerald-500">
          <option value="banjari">Hadroh Banjari (Cepat & Energetik)</option>
          <option value="habibi">Habibi / Duff Rhythm (Sedang)</option>
          <option value="slow">Hadroh Pelan / Meditatif (Slow Beat)</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1 text-slate-300">Lirik / Catatan Lagu (Opsional):</label>
        <textarea id="lyricsInput" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-slate-200 focus:outline-none focus:border-emerald-500" placeholder="Masukkan lirik sholawat atau catatan untuk disimpan ke sheet..."></textarea>
      </div>

      <button id="generateBtn" onclick="generateRebana()" class="w-full bg-emerald-600 hover:bg-emerald-500 font-bold py-3 rounded-lg transition duration-200 flex justify-center items-center gap-2 shadow-lg shadow-emerald-900/40">
        <span>Generate & Putar Irama Rebana</span>
      </button>
    </div>

    <!-- Loading Indicator -->
    <div id="loading" class="hidden my-6 text-center">
      <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-emerald-500 border-t-transparent"></div>
      <p class="text-xs text-slate-400 mt-2">Gemini AI sedang merancang komposisi ketukan rebana (1-3 detik)...</p>
    </div>

    <!-- Result Area -->
    <div id="resultArea" class="hidden mt-6 p-4 bg-slate-900 rounded-xl border border-emerald-500/30 text-center">
      <h3 class="text-sm font-semibold text-emerald-400 mb-2">🎉 Ketukan Rebana Berhasil Diputar!</h3>
      <p id="patternInfo" class="text-xs text-slate-400 mb-4"></p>
      <button onclick="replaySound()" class="bg-slate-800 hover:bg-slate-700 border border-slate-600 text-slate-200 text-sm px-4 py-2 rounded-lg font-medium transition">
        🔄 Putar Ulang Irama
      </button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwOQrq_I95t0SA4kX_ZSRexLetuQyU7Q2uGXlC0YVk6xmdXOAj7RfjSodIoBP9sqX28uA/exec";

    // Web Audio Synthesizer untuk Suara Perkusi Rebana
    let audioCtx;
    let lastSequence = [];

    function playRebanaSound(type, timeOffset) {
      if (!audioCtx) return;
      
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const now = audioCtx.currentTime + timeOffset;

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'dung') {
        // Suara Bass Rebana (Dung/Tumbuk)
        osc.type = 'sine';
        osc.frequency.setValueAtTime(140, now);
        osc.frequency.exponentialRampToValueAtTime(35, now + 0.3);
        gain.gain.setValueAtTime(1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.3);
      } else {
        // Suara High Drum (Tak/Keprak)
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(550, now);
        osc.frequency.exponentialRampToValueAtTime(180, now + 0.1);
        gain.gain.setValueAtTime(0.7, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
      }
    }

    function playPattern(sequence) {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      sequence.forEach(item => {
        playRebanaSound(item.sound, item.time);
      });
    }

    function replaySound() {
      if (lastSequence.length > 0) {
        playPattern(lastSequence);
      }
    }

    async function generateRebana() {
      const style = document.getElementById('styleSelect').value;
      const lyrics = document.getElementById('lyricsInput').value;
      const btn = document.getElementById('generateBtn');
      const loading = document.getElementById('loading');
      const resultArea = document.getElementById('resultArea');
      const patternInfo = document.getElementById('patternInfo');

      btn.disabled = true;
      btn.classList.add('opacity-50');
      loading.classList.remove('hidden');
      resultArea.classList.add('hidden');

      try {
        // 1. Minta komposisi ritme dari Gemini AI via Vercel Backend
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ style, lyrics })
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({ error: 'Gagal merespons server' }));
          throw new Error(errData.error || `Server Error (${response.status})`);
        }

        const patternData = await response.json();

        if (patternData.sequence && Array.isArray(patternData.sequence)) {
          lastSequence = patternData.sequence;
          playPattern(lastSequence);

          patternInfo.innerText = `Pola: ${patternData.pattern_name || style} | BPM: ${patternData.bpm || 110}`;
          resultArea.classList.remove('hidden');
        } else {
          throw new Error("Format pola musik dari AI tidak valid");
        }

        // 2. Simpan Log ke Google Apps Script (Background)
        if (GAS_URL) {
          fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ style, lyrics })
          }).catch(e => console.log("GAS Log Error:", e));
        }

      } catch (err) {
        alert("Detail Error: " + err.message);
      } finally {
        btn.disabled = false;
        btn.classList.remove('opacity-50');
        loading.classList.add('hidden');
      }
    }
  </script>
</body>
</html>
