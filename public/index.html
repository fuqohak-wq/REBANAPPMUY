<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Music Video Creator (Fresh Leaf Edition)</title>
  <style>
    :root {
      --bg: #f0fdf4;            /* Hijau daun sangat muda */
      --card: #ffffff;          /* Kartu putih bersih */
      --accent: #16a34a;        /* Hijau daun segar */
      --accent-hover: #15803d;  /* Hijau daun gelap */
      --text: #0f172a;          /* Teks gelap scannable */
      --subtext: #475569;       /* Subteks abu-abu netral */
      --border: #bbf7d0;        /* Border hijau muda */
      --shadow: 0 10px 25px -5px rgba(22, 163, 74, 0.15);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .container {
      max-width: 680px;
      width: 100%;
      background: var(--card);
      padding: 32px;
      border-radius: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    h1 {
      text-align: center;
      color: #15803d;
      margin: 0 0 8px 0;
      font-size: 1.8rem;
    }

    p.subtitle {
      text-align: center;
      color: var(--subtext);
      margin-top: 0;
      margin-bottom: 24px;
      font-size: 0.95rem;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #1e293b;
    }

    input[type="file"], select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      color: var(--text);
      box-sizing: border-box;
      font-size: 0.95rem;
      outline: none;
    }

    input[type="file"]:focus, select:focus {
      border-color: var(--accent);
      background: #ffffff;
    }

    .radio-group {
      display: flex;
      gap: 12px;
    }

    .radio-card {
      flex: 1;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      background: #f8fafc;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .radio-card input { display: none; }

    .radio-card.active {
      border-color: var(--accent);
      background: #dcfce7;
      color: #14532d;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);
      transition: background 0.2s;
    }

    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { background: #94a3b8; box-shadow: none; cursor: not-allowed; }

    .progress-container {
      width: 100%;
      background-color: #e2e8f0;
      border-radius: 10px;
      height: 12px;
      margin-top: 15px;
      overflow: hidden;
      display: none;
    }

    .progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }

    .status-box {
      margin-top: 15px;
      padding: 12px;
      background: #f0fdf4;
      border-radius: 10px;
      font-size: 0.85rem;
      color: #166534;
      text-align: center;
      border: 1px solid var(--border);
    }

    .preview-area {
      margin-top: 24px;
      text-align: center;
      display: none;
    }

    canvas {
      max-width: 100%;
      border-radius: 16px;
      box-shadow: var(--shadow);
      background: #000;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🌿 AI Music Video Creator</h1>
  <p class="subtitle">Desain Hijau Daun Segar + Efek Animasi Realtime</p>

  <!-- 1. UPLOAD AUDIO MP3 -->
  <div class="form-group">
    <label for="audioInput">🎵 1. Upload File Audio MP3:</label>
    <input type="file" id="audioInput" accept="audio/*">
  </div>

  <!-- 2. UPLOAD GAMBAR ATAU VIDEO BACKGROUND -->
  <div class="form-group">
    <label for="bgInput">🖼️ 2. Upload Gambar / Video Background Asli:</label>
    <input type="file" id="bgInput" accept="image/*,video/*">
  </div>

  <!-- 3. PILIHAN FORMAT RENDER (LEBAR / TEGAK) -->
  <div class="form-group">
    <label>📐 3. Format Ukuran Video Output:</label>
    <div class="radio-group">
      <label class="radio-card active" id="labelLebar">
        <input type="radio" name="aspectRatio" value="16:9" checked>
        🖥️ Lebar (16:9)<br><small>YouTube / Desktop</small>
      </label>
      <label class="radio-card" id="labelTegak">
        <input type="radio" name="aspectRatio" value="9:16">
        📱 Tegak (9:16)<br><small>Shorts / Reels / TikTok</small>
      </label>
    </div>
  </div>

  <!-- 4. PILIHAN EFEK ANIMASI OVERLAY -->
  <div class="form-group">
    <label for="effectSelect">✨ 4. Efek Animasi Overlay tambahan:</label>
    <select id="effectSelect">
      <option value="none">Tanpa Efek (Polosan)</option>
      <option value="rain">🌧️ Air Hujan Deras</option>
      <option value="fire">🔥 Percikan Api Melayang</option>
      <option value="particles">✨ Partikel Cahaya Bintang</option>
    </select>
  </div>

  <button id="startBtn">🚀 Mulaikan Pemrosesan & Render Lirik</button>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="status-box" id="statusText">Status: Siap memproses video musik.</div>

  <!-- KANVAS PEMUTAR ANIMASI -->
  <div class="preview-area" id="previewArea">
    <h3 style="color:#15803d; margin-bottom:10px;">🎥 Hasil Video Animasi</h3>
    <canvas id="videoCanvas"></canvas>
  </div>
</div>

<script>
  // Pilihan Format Ratio
  const labelLebar = document.getElementById('labelLebar');
  const labelTegak = document.getElementById('labelTegak');
  const radioInputs = document.querySelectorAll('input[name="aspectRatio"]');

  radioInputs.forEach(input => {
    input.addEventListener('change', (e) => {
      labelLebar.classList.toggle('active', e.target.value === '16:9');
      labelTegak.classList.toggle('active', e.target.value === '9:16');
    });
  });

  const startBtn = document.getElementById('startBtn');
  const statusText = document.getElementById('statusText');
  const progressContainer = document.getElementById('progressContainer');
  const progressBar = document.getElementById('progressBar');
  const previewArea = document.getElementById('previewArea');
  const canvas = document.getElementById('videoCanvas');
  const ctx = canvas.getContext('2d');

  let particles = [];

  startBtn.addEventListener('click', async () => {
    const audioFile = document.getElementById('audioInput').files[0];
    const bgFile = document.getElementById('bgInput').files[0];
    const aspectRatio = document.querySelector('input[name="aspectRatio"]:checked').value;
    const selectedEffect = document.getElementById('effectSelect').value;

    if (!audioFile || !bgFile) {
      return alert("Upload File Audio MP3 dan Gambar/Video Background terlebih dahulu!");
    }

    // Tentukan Resolusi Canvas berdasarkan Pilihan YouTube Lebar / Tegak
    if (aspectRatio === '16:9') {
      canvas.width = 1280;
      canvas.height = 720;
    } else {
      canvas.width = 720;
      canvas.height = 1280;
    }

    startBtn.disabled = true;
    progressContainer.style.display = "block";
    previewArea.style.display = "block";

    statusText.innerText = "⏳ Memuat background & efek animasi...";
    progressBar.style.width = "50%";

    // Inisialisasi Partikel Efek
    initParticles(selectedEffect, canvas.width, canvas.height);

    // Muat Background (Gambar atau Video)
    if (bgFile.type.startsWith('video/')) {
      const videoEl = document.createElement('video');
      videoEl.src = URL.createObjectURL(bgFile);
      videoEl.loop = true;
      videoEl.muted = true;
      videoEl.play();
      
      videoEl.onloadedmetadata = () => {
        startAnimationLoop(videoEl, 'video', selectedEffect);
        progressBar.style.width = "100%";
        statusText.innerText = "🎉 Video Animasi Siap Diputar!";
      };
    } else {
      const imgEl = new Image();
      imgEl.src = URL.createObjectURL(bgFile);
      
      imgEl.onload = () => {
        startAnimationLoop(imgEl, 'image', selectedEffect);
        progressBar.style.width = "100%";
        statusText.innerText = "🎉 Video Animasi Siap Diputar!";
      };
    }
  });

  // Sistem Animasi Realtime Canvas (Background + Efek Hujan/Api + Lirik)
  function startAnimationLoop(mediaEl, type, effect) {
    function render() {
      // 1. Gambar Background
      if (type === 'video') {
        ctx.drawImage(mediaEl, 0, 0, canvas.width, canvas.height);
      } else {
        ctx.drawImage(mediaEl, 0, 0, canvas.width, canvas.height);
      }

      // 2. Gambar Efek Animasi Overlap
      updateAndDrawParticles(effect);

      // 3. Request Frame Selanjutnya
      requestAnimationFrame(render);
    }
    render();
  }

  // Logika Pembuat Partikel (Hujan / Api / Bintang)
  function initParticles(effect, w, h) {
    particles = [];
    const count = effect === 'rain' ? 150 : 60;

    for (let i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * w,
        y: Math.random() * h,
        speed: Math.random() * 8 + 4,
        size: Math.random() * 3 + 1,
        opacity: Math.random() * 0.8 + 0.2
      });
    }
  }

  function updateAndDrawParticles(effect) {
    if (effect === 'none') return;

    ctx.save();
    for (let p of particles) {
      if (effect === 'rain') {
        // Efek Air Hujan
        ctx.strokeStyle = `rgba(186, 230, 253, ${p.opacity})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x - 1, p.y + p.speed * 2);
        ctx.stroke();

        p.y += p.speed * 2;
        if (p.y > canvas.height) p.y = 0;

      } else if (effect === 'fire') {
        // Efek Percikan Api Melayang
        ctx.fillStyle = `rgba(251, 146, 60, ${p.opacity})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 1.5, 0, Math.PI * 2);
        ctx.fill();

        p.y -= p.speed * 0.5; // Api naik ke atas
        p.x += (Math.random() - 0.5) * 2;
        if (p.y < 0) p.y = canvas.height;

      } else if (effect === 'particles') {
        // Efek Partikel Cahaya
        ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();

        p.y -= p.speed * 0.2;
        if (p.y < 0) p.y = canvas.height;
      }
    }
    ctx.restore();
  }
</script>

</body>
</html>
