<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Music Video Creator</title>
  <style>
    :root {
      --bg: #f0fdf4;
      --card: #ffffff;
      --accent: #16a34a;
      --accent-hover: #15803d;
      --text: #0f172a;
      --subtext: #475569;
      --border: #bbf7d0;
      --shadow: 0 10px 25px -5px rgba(22, 163, 74, 0.15);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .container {
      max-width: 680px;
      width: 100%;
      background: var(--card);
      padding: 32px;
      border-radius: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    h1 { text-align: center; color: #15803d; margin: 0 0 8px 0; font-size: 1.8rem; }
    p.subtitle { text-align: center; color: var(--subtext); margin-top: 0; margin-bottom: 24px; font-size: 0.95rem; }

    .form-group { margin-bottom: 18px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; color: #1e293b; }

    input[type="file"], select, textarea {
      width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid #cbd5e1;
      background: #f8fafc; color: var(--text); box-sizing: border-box; font-size: 0.95rem; outline: none;
      font-family: inherit;
    }

    textarea { height: 120px; resize: vertical; }

    .radio-group { display: flex; gap: 12px; }
    .radio-card {
      flex: 1; border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px;
      text-align: center; cursor: pointer; background: #f8fafc; font-weight: 600; font-size: 0.9rem;
    }
    .radio-card input { display: none; }
    .radio-card.active { border-color: var(--accent); background: #dcfce7; color: #14532d; }

    button {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: var(--accent); color: white; font-weight: 700; font-size: 1rem;
      cursor: pointer; margin-top: 10px; box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);
    }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { background: #94a3b8; box-shadow: none; cursor: not-allowed; }
    button.download-btn { background: #0284c7; box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3); }

    .progress-container {
      width: 100%; background-color: #e2e8f0; border-radius: 10px;
      height: 12px; margin-top: 15px; overflow: hidden; display: none;
    }
    .progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }

    .status-box {
      margin-top: 15px; padding: 12px; background: #f0fdf4; border-radius: 10px;
      font-size: 0.85rem; color: #166534; text-align: center; border: 1px solid var(--border);
    }

    .preview-area { margin-top: 24px; text-align: center; display: none; }
    canvas { max-width: 100%; border-radius: 16px; box-shadow: var(--shadow); background: #000; }
  </style>
</head>
<body>

<div class="container">
  <h1>🌿 AI Music Video Creator</h1>
  <p class="subtitle">Smart Lightweight Video Generator</p>

  <div class="form-group">
    <label for="audioInput">🎵 1. Upload File Audio MP3:</label>
    <input type="file" id="audioInput" accept="audio/*">
  </div>

  <div class="form-group">
    <label for="bgInput">🖼️ 2. Upload Gambar / Video Background:</label>
    <input type="file" id="bgInput" accept="image/*,video/*">
  </div>

  <div class="form-group">
    <label for="lyricsInput">📝 3. Tempel Lirik Teks Asli (Berurutan per baris):</label>
    <textarea id="lyricsInput" placeholder="Tempel seluruh lirik lagu di sini secara berurutan per baris..."></textarea>
  </div>

  <div class="form-group">
    <label>📐 4. Format Ukuran Video Output:</label>
    <div class="radio-group">
      <label class="radio-card active" id="labelLebar">
        <input type="radio" name="aspectRatio" value="16:9" checked>
        🖥️ Lebar (16:9)<br><small>YouTube / Desktop</small>
      </label>
      <label class="radio-card" id="labelTegak">
        <input type="radio" name="aspectRatio" value="9:16">
        📱 Tegak (9:16)<br><small>Shorts / Reels / TikTok</small>
      </label>
    </div>
  </div>

  <div class="form-group">
    <label for="effectSelect">✨ 5. Efek Animasi Overlay tambahan:</label>
    <select id="effectSelect">
      <option value="none">Tanpa Efek (Polosan)</option>
      <option value="rain">🌧️ Air Hujan Deras</option>
      <option value="fire">🔥 Percikan Api Melayang</option>
      <option value="particles">✨ Partikel Cahaya Bintang</option>
    </select>
  </div>

  <button id="startBtn">🚀 Mulaikan Proses Lirik & Render Video</button>
  <button id="downloadBtn" class="download-btn" style="display: none;">💾 Unduh Hasil Video MP4</button>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="status-box" id="statusText">Status: Siap memproses video musik.</div>

  <div class="preview-area" id="previewArea">
    <h3 style="color:#15803d; margin-bottom:10px;">🎥 Hasil Video Animasi</h3>
    <canvas id="videoCanvas"></canvas>
  </div>
</div>

<script>
  const CHUNK_DURATION = 25; 

  const labelLebar = document.getElementById('labelLebar');
  const labelTegak = document.getElementById('labelTegak');
  const radioInputs = document.querySelectorAll('input[name="aspectRatio"]');

  radioInputs.forEach(input => {
    input.addEventListener('change', (e) => {
      labelLebar.classList.toggle('active', e.target.value === '16:9');
      labelTegak.classList.toggle('active', e.target.value === '9:16');
    });
  });

  const startBtn = document.getElementById('startBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const statusText = document.getElementById('statusText');
  const progressContainer = document.getElementById('progressContainer');
  const progressBar = document.getElementById('progressBar');
  const previewArea = document.getElementById('previewArea');
  const canvas = document.getElementById('videoCanvas');
  const ctx = canvas.getContext('2d');

  let particles = [];
  let parsedSubtitles = [];
  let mediaRecorder = null;
  let recordedChunks = [];
  let selectedMimeType = 'video/mp4';

  startBtn.addEventListener('click', async () => {
    const audioFile = document.getElementById('audioInput').files[0];
    const bgFile = document.getElementById('bgInput').files[0];
    const rawLyricsText = document.getElementById('lyricsInput').value;
    const aspectRatio = document.querySelector('input[name="aspectRatio"]:checked').value;
    const selectedEffect = document.getElementById('effectSelect').value;

    if (!audioFile || !bgFile) {
      return alert("Upload File Audio MP3 dan Gambar/Video Background terlebih dahulu!");
    }

    if (!rawLyricsText.trim()) {
      return alert("Harap tempelkan lirik lagu secara berurutan!");
    }

    if (aspectRatio === '16:9') {
      canvas.width = 1280; canvas.height = 720;
    } else {
      canvas.width = 720; canvas.height = 1280;
    }

    try {
      startBtn.disabled = true;
      downloadBtn.style.display = "none";
      progressContainer.style.display = "block";
      previewArea.style.display = "block";

      statusText.innerText = "⏳ Membaca audio & menyelaraskan data...";
      
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const arrayBuffer = await audioFile.arrayBuffer();
      const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
      
      const totalDuration = audioBuffer.duration;
      const totalChunks = Math.ceil(totalDuration / CHUNK_DURATION);

      const lyricLines = rawLyricsText
        .split('\n')
        .map(l => l.trim())
        .filter(l => l.length > 0 && !l.startsWith('['));

      const linesPerChunk = Math.ceil(lyricLines.length / totalChunks);
      parsedSubtitles = [];

      for (let i = 0; i < totalChunks; i++) {
        const startSec = i * CHUNK_DURATION;
        const endSec = Math.min((i + 1) * CHUNK_DURATION, totalDuration);
        const actualDuration = endSec - startSec;
        
        const chunkLyricLines = lyricLines.slice(i * linesPerChunk, (i + 1) * linesPerChunk);
        const chunkLyricsText = chunkLyricLines.join('\n');

        progressBar.style.width = `${Math.round(((i + 1) / totalChunks) * 50)}%`;
        statusText.innerText = `🔄 Memproses bagian lirik ${i + 1} dari ${totalChunks} (AI)...`;

        const chunkBlob = await sliceAndCompressAudio(audioBuffer, startSec, endSec);
        const base64Audio = await blobToBase64(chunkBlob);

        const res = await fetch('/api/transcribe-chunk', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            audioBase64: base64Audio.split(',')[1],
            mimeType: 'audio/wav',
            offsetSeconds: Math.floor(startSec),
            duration: Math.floor(actualDuration),
            chunkLyrics: chunkLyricsText
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `Gagal pada bagian ${i+1}`);
        
        if (data.subtitles && Array.isArray(data.subtitles)) {
          parsedSubtitles.push(...data.subtitles);
        }
      }

      console.log("Subtitles Sync Result:", parsedSubtitles);
      progressBar.style.width = "60%";

      statusText.innerText = "🎥 Menyiapkan rekaman video...";
      initParticles(selectedEffect, canvas.width, canvas.height);

      const audioEl = new Audio(URL.createObjectURL(audioFile));
      audioEl.crossOrigin = "anonymous";

      if (bgFile.type.startsWith('video/')) {
        const videoEl = document.createElement('video');
        videoEl.src = URL.createObjectURL(bgFile);
        videoEl.muted = true;
        videoEl.loop = true;
        videoEl.playsInline = true;
        
        videoEl.onloadedmetadata = () => {
          videoEl.play();
          setupRecorderAndStart(audioEl, videoEl, 'video', selectedEffect);
        };
      } else {
        const imgEl = new Image();
        imgEl.src = URL.createObjectURL(bgFile);
        imgEl.onload = () => {
          setupRecorderAndStart(audioEl, imgEl, 'image', selectedEffect);
        };
      }

    } catch (err) {
      console.error(err);
      statusText.innerText = "❌ Error: " + err.message;
      startBtn.disabled = false;
    }
  });

  function setupRecorderAndStart(audioEl, mediaEl, type, effect) {
    recordedChunks = [];
    const canvasStream = canvas.captureStream(30);

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaElementSource(audioEl);
    const dest = audioCtx.createMediaStreamDestination();
    source.connect(dest);
    source.connect(audioCtx.destination);

    const combinedStream = new MediaStream();
    canvasStream.getVideoTracks().forEach(track => combinedStream.addTrack(track));
    dest.stream.getAudioTracks().forEach(track => combinedStream.addTrack(track));

    const types = [
      'video/mp4;codecs=h264,aac',
      'video/mp4',
      'video/webm;codecs=vp9,opus',
      'video/webm'
    ];
    selectedMimeType = types.find(t => MediaRecorder.isTypeSupported(t)) || 'video/webm';

    mediaRecorder = new MediaRecorder(combinedStream, { mimeType: selectedMimeType });

    mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) recordedChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
      const ext = selectedMimeType.includes('mp4') ? 'mp4' : 'webm';
      const blob = new Blob(recordedChunks, { type: selectedMimeType });
      const videoUrl = URL.createObjectURL(blob);
      
      downloadBtn.style.display = "block";
      downloadBtn.innerText = `💾 Unduh Hasil Video (${ext.toUpperCase()})`;
      downloadBtn.onclick = () => {
        const a = document.createElement('a');
        a.href = videoUrl;
        a.download = `music_video_lyric.${ext}`;
        a.click();
      };
      statusText.innerText = "🎉 Rekaman Selesai! Klik tombol unduh di atas.";
      startBtn.disabled = false;
    };

    // Mulai merekam dulu, baru nyalakan audio agar sinkron dari awal frame
    mediaRecorder.start();
    audioEl.play();
    
    progressBar.style.width = "100%";
    statusText.innerText = "🎉 Video sedang direkam. Mohon tunggu lagu selesai dimainkan...";

    startAnimationLoop(mediaEl, type, effect, audioEl);
  }

  function startAnimationLoop(mediaEl, type, effect, audioEl) {
    function render() {
      if (type === 'video') {
        ctx.drawImage(mediaEl, 0, 0, canvas.width, canvas.height);
      } else {
        ctx.drawImage(mediaEl, 0, 0, canvas.width, canvas.height);
      }
      
      updateAndDrawParticles(effect);

      const currentTime = audioEl.currentTime;
      const currentLyric = parsedSubtitles.find(sub => currentTime >= sub.start && currentTime <= sub.end);

      if (currentLyric) {
        ctx.save();
        const fontSize = canvas.height > 1000 ? 42 : 36;
        ctx.font = `bold ${fontSize}px 'Segoe UI', sans-serif`;
        ctx.textAlign = "center";
        
        const yPos = canvas.height - 150;
        const text = currentLyric.text;
        const textWidth = ctx.measureText(text).width;

        ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
        ctx.fillRect(canvas.width / 2 - textWidth / 2 - 20, yPos - fontSize, textWidth + 40, fontSize + 20);

        ctx.strokeStyle = "#000000";
        ctx.lineWidth = 6;
        ctx.strokeText(text, canvas.width / 2, yPos);

        ctx.fillStyle = "#facc15";
        ctx.fillText(text, canvas.width / 2, yPos);
        
        ctx.restore();
      }

      if (!audioEl.ended) {
        requestAnimationFrame(render);
      } else {
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
          mediaRecorder.stop();
        }
      }
    }
    render();
  }

  async function sliceAndCompressAudio(buffer, startSec, endSec) {
    const targetSampleRate = 8000; 
    const duration = endSec - startSec;
    const offlineCtx = new OfflineAudioContext(1, Math.floor(duration * targetSampleRate), targetSampleRate);

    const source = offlineCtx.createBufferSource();
    source.buffer = buffer;
    source.start(0, startSec, duration);
    source.connect(offlineCtx.destination);

    const renderedBuffer = await offlineCtx.startRendering();
    return audioBufferToWavBlob(renderedBuffer);
  }

  function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  function audioBufferToWavBlob(buffer) {
    const numOfChan = buffer.numberOfChannels,
      length = buffer.length * numOfChan * 2 + 44,
      out = new DataView(new ArrayBuffer(length)),
      channels = [], sampleRate = buffer.sampleRate;
    let sample, offset = 0, pos = 0;

    function setUint16(data) { out.setUint16(pos, data, true); pos += 2; }
    function setUint32(data) { out.setUint32(pos, data, true); pos += 4; }

    setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157);
    setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
    setUint32(sampleRate); setUint32(sampleRate * 2 * numOfChan);
    setUint16(numOfChan * 2); setUint16(16); setUint32(0x61746164);
    setUint32(length - pos - 4);

    for (let i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));

    while (offset < buffer.length) {
      for (let i = 0; i < numOfChan; i++) {
        sample = Math.max(-1, Math.min(1, channels[i][offset]));
        sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0;
        out.setInt16(pos, sample, true); pos += 2;
      }
      offset++;
    }
    return new Blob([out], { type: 'audio/wav' });
  }

  function initParticles(effect, w, h) {
    particles = [];
    const count = effect === 'rain' ? 150 : 60;
    for (let i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * w, y: Math.random() * h,
        speed: Math.random() * 8 + 4, size: Math.random() * 3 + 1,
        opacity: Math.random() * 0.8 + 0.2
      });
    }
  }

  function updateAndDrawParticles(effect) {
    if (effect === 'none') return;
    ctx.save();
    for (let p of particles) {
      if (effect === 'rain') {
        ctx.strokeStyle = `rgba(186, 230, 253, ${p.opacity})`;
        ctx.lineWidth = 1.5; ctx.beginPath();
        ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - 1, p.y + p.speed * 2); ctx.stroke();
        p.y += p.speed * 2; if (p.y > canvas.height) p.y = 0;
      } else if (effect === 'fire') {
        ctx.fillStyle = `rgba(251, 146, 60, ${p.opacity})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 1.5, 0, Math.PI * 2); ctx.fill();
        p.y -= p.speed * 0.5; p.x += (Math.random() - 0.5) * 2; if (p.y < 0) p.y = canvas.height;
      } else if (effect === 'particles') {
        ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
        p.y -= p.speed * 0.2; if (p.y < 0) p.y = canvas.height;
      }
    }
    ctx.restore();
  }
</script>

</body>
</html>
