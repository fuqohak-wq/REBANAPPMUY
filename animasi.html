<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Dengan Animasi - Visual Effects Studio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen py-10 px-4 font-sans text-gray-100">

    <div class="max-w-4xl mx-auto bg-gray-900 rounded-2xl shadow-2xl border border-gray-800 overflow-hidden">
        <!-- Header & Navigasi Tab -->
        <div class="p-6 text-center border-b border-gray-800">
            <h1 class="text-3xl font-bold text-yellow-400 flex justify-center items-center gap-2">
                ✨ Animated Music Video Generator (AI Powered)
            </h1>
            <p class="text-gray-400 text-sm mt-1">Lirik Presisi Otomatis dengan Gemini AI + Efek Visual Dynamic</p>
            
            <!-- MENU NAVIGASI PILIHAN EDIT -->
            <div class="mt-6 flex justify-center gap-3 bg-gray-800 p-1.5 rounded-xl border border-gray-700">
                <a href="#" class="flex-1 py-2.5 px-4 rounded-lg font-semibold text-sm transition bg-yellow-500 text-gray-900 shadow-md">
                    ✨ EDIT DENGAN ANIMASI (1-15 Mins)
                </a>
                <a href="index.html" class="flex-1 py-2.5 px-4 rounded-lg font-semibold text-sm transition text-gray-400 hover:text-white hover:bg-gray-700">
                    🎬 EDIT VIDEO PANJANG
                </a>
            </div>
        </div>

        <div class="p-6 space-y-6">
            <!-- API Key Input -->
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">🔑 Gemini API Key:</label>
                <input type="password" id="apiKey" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm text-gray-200 focus:outline-none focus:border-yellow-500" placeholder="Masukkan Gemini API Key Anda...">
            </div>

            <!-- Upload Options -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">🎵 Upload Audio (MP3):</label>
                    <input type="file" id="audioInput" accept="audio/*" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm text-gray-300 file:mr-4 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-sm file:bg-yellow-500 file:text-gray-900 hover:file:bg-yellow-400">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">🖼️ Upload Background Image:</label>
                    <input type="file" id="imageInput" accept="image/*" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm text-gray-300 file:mr-4 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-sm file:bg-yellow-500 file:text-gray-900 hover:file:bg-yellow-400">
                </div>
            </div>

            <!-- KUSTOMISASI LIRIK (FONT & POSISI) -->
            <div class="bg-gray-800/80 p-4 rounded-xl border border-gray-700 space-y-3">
                <h3 class="text-sm font-semibold text-yellow-400 flex items-center gap-2">
                    ⚙️ Kustomisasi Tampilan Lirik
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Gaya Font -->
                    <div>
                        <label class="block text-xs text-gray-300 mb-1">Gaya Font Teks:</label>
                        <select id="fontFamily" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-sm text-gray-200 focus:outline-none focus:border-yellow-500">
                            <option value="sans-serif">Sans-Serif (Modern / Bersih)</option>
                            <option value="serif">Serif (Klasik / Elegan)</option>
                            <option value="monospace">Monospace (Ketik / Retro)</option>
                            <option value="Impact">Impact (Bold / Tegas)</option>
                            <option value="Trebuchet MS">Trebuchet MS (Casual)</option>
                        </select>
                    </div>

                    <!-- Posisi Vertikal -->
                    <div>
                        <label class="block text-xs text-gray-300 mb-1">Posisi Teks (Vertikal):</label>
                        <select id="textPosition" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-sm text-gray-200 focus:outline-none focus:border-yellow-500">
                            <option value="bottom">Bawah (Default)</option>
                            <option value="center">Tengah (Center)</option>
                            <option value="top">Atas (Top)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Pilih Efek Animasi -->
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">🎨 Pilih Efek Animasi Dynamic:</label>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    <button type="button" onclick="selectEffect('rain')" id="btn-rain" class="effect-btn border-2 border-yellow-500 bg-gray-800 p-3 rounded-xl flex items-center gap-3 font-semibold text-sm hover:bg-gray-700">
                        🌧️ Air Hujan
                    </button>
                    <button type="button" onclick="selectEffect('lightning')" id="btn-lightning" class="effect-btn border border-gray-700 bg-gray-800 p-3 rounded-xl flex items-center gap-3 font-semibold text-sm hover:bg-gray-700">
                        ⚡ Petir & Hujan
                    </button>
                    <button type="button" onclick="selectEffect('fire')" id="btn-fire" class="effect-btn border border-gray-700 bg-gray-800 p-3 rounded-xl flex items-center gap-3 font-semibold text-sm hover:bg-gray-700">
                        🔥 Api & Bara
                    </button>
                    <button type="button" onclick="selectEffect('stars')" id="btn-stars" class="effect-btn border border-gray-700 bg-gray-800 p-3 rounded-xl flex items-center gap-3 font-semibold text-sm hover:bg-gray-700">
                        🌟 Bintang & Galaxy
                    </button>
                    <button type="button" onclick="selectEffect('snow')" id="btn-snow" class="effect-btn border border-gray-700 bg-gray-800 p-3 rounded-xl flex items-center gap-3 font-semibold text-sm hover:bg-gray-700">
                        ❄️ Salju Syahdu
                    </button>
                    <button type="button" onclick="selectEffect('spectrum')" id="btn-spectrum" class="effect-btn border border-gray-700 bg-gray-800 p-3 rounded-xl flex items-center gap-3 font-semibold text-sm hover:bg-gray-700">
                        📊 Audio Spectrum
                    </button>
                </div>
            </div>

            <!-- Canvas Live Preview -->
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">📺 Live Preview Canvas (480p Ringan):</label>
                <div class="relative w-full aspect-video bg-black rounded-xl overflow-hidden shadow-inner border border-gray-800 flex items-center justify-center">
                    <canvas id="previewCanvas" class="w-full h-full object-contain"></canvas>
                </div>
            </div>

            <!-- Status Area -->
            <div id="statusArea" class="hidden p-4 bg-gray-800 rounded-lg border border-gray-700 text-sm space-y-2">
                <p id="statusText" class="font-semibold text-yellow-400">Menyiapkan sistem...</p>
                <div class="w-full bg-gray-700 rounded-full h-2 overflow-hidden">
                    <div id="progressBar" class="bg-yellow-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <!-- Action Button -->
            <button id="renderBtn" onclick="startRenderProcess()" class="w-full py-4 bg-yellow-500 hover:bg-yellow-400 text-gray-900 font-bold rounded-xl shadow-lg transition flex justify-center items-center gap-2 text-lg">
                🎬 Proses AI Lirik & Render Video (MP4 Ringan)
            </button>

            <!-- Output Preview -->
            <div id="outputArea" class="hidden space-y-4 pt-4 border-t border-gray-800">
                <h3 class="text-lg font-bold text-gray-200">Hasil Video MP4 Ultra Lightweight:</h3>
                <video id="videoPreview" controls class="w-full rounded-lg shadow-md max-h-[400px] bg-black"></video>
                <a id="downloadBtn" class="block text-center py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg shadow-md transition cursor-pointer">
                    💾 Download Video (MP4 Format)
                </a>
            </div>
        </div>
    </div>

    <audio id="audioElement" class="hidden"></audio>

    <script>
        let currentEffect = 'rain';
        let animationId = null;
        let particles = [];
        let audioCtx, analyser, dataArray;
        let lyricTimestamps = [];

        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        
        // RESOLUSI DIECILKAN KE 854x480 (480p SD - Sangat Ringan & Pas untuk Medsos)
        canvas.width = 854;
        canvas.height = 480;

        let bgImage = new Image();
        let bgLoaded = false;

        // Upload Background
        document.getElementById('imageInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                bgImage.src = URL.createObjectURL(file);
                bgImage.onload = () => { bgLoaded = true; };
            }
        });

        function selectEffect(effect) {
            currentEffect = effect;
            document.querySelectorAll('.effect-btn').forEach(btn => {
                btn.className = "effect-btn border border-gray-700 bg-gray-800 p-3 rounded-xl flex items-center gap-3 font-semibold text-sm hover:bg-gray-700";
            });
            document.getElementById(`btn-${effect}`).className = "effect-btn border-2 border-yellow-500 bg-gray-800 p-3 rounded-xl flex items-center gap-3 font-semibold text-sm hover:bg-gray-700";
            initParticles();
        }

        function initParticles() {
            particles = [];
            const count = 100; // Jumlah partikel dikurangi sedikit agar render cepat
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    speed: Math.random() * 6 + 3,
                    size: Math.random() * 2.5 + 1,
                    alpha: Math.random()
                });
            }
        }
        initParticles();

        function drawFrame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Background Image
            if (bgLoaded) {
                const scale = Math.max(canvas.width / bgImage.width, canvas.height / bgImage.height);
                const imgW = bgImage.width * scale;
                const imgH = bgImage.height * scale;
                ctx.drawImage(bgImage, (canvas.width / 2) - (imgW / 2), (canvas.height / 2) - (imgH / 2), imgW, imgH);
            } else {
                ctx.fillStyle = '#050510';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // 2. Dark Overlay
            ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 3. Render Animated Effects
            if (currentEffect === 'rain' || currentEffect === 'lightning') {
                ctx.strokeStyle = 'rgba(174, 194, 224, 0.6)';
                ctx.lineWidth = 1.2;
                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x - 2, p.y + p.speed * 2.5);
                    ctx.stroke();

                    p.y += p.speed;
                    p.x -= 0.5;
                    if (p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
                });

                if (currentEffect === 'lightning' && Math.random() < 0.02) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
            } else if (currentEffect === 'fire') {
                particles.forEach(p => {
                    ctx.fillStyle = `rgba(${255}, ${Math.floor(Math.random() * 150)}, 0, ${p.alpha})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * 1.8, 0, Math.PI * 2);
                    ctx.fill();

                    p.y -= p.speed * 0.5;
                    p.alpha -= 0.008;
                    if (p.y < 0 || p.alpha <= 0) {
                        p.y = canvas.height + 10;
                        p.x = Math.random() * canvas.width;
                        p.alpha = Math.random();
                    }
                });
            } else if (currentEffect === 'stars' || currentEffect === 'snow') {
                particles.forEach(p => {
                    ctx.fillStyle = currentEffect === 'stars' ? `rgba(255, 255, 255, ${Math.abs(Math.sin(p.alpha))})` : 'rgba(255, 255, 255, 0.8)';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();

                    p.y += currentEffect === 'snow' ? p.speed * 0.3 : 0;
                    p.alpha += 0.02;
                    if (p.y > canvas.height) { p.y = -5; p.x = Math.random() * canvas.width; }
                });
            } else if (currentEffect === 'spectrum' && analyser) {
                analyser.getByteFrequencyData(dataArray);
                const barWidth = (canvas.width / dataArray.length) * 2.2;
                let x = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    const barHeight = (dataArray[i] / 255) * 180;
                    ctx.fillStyle = `hsl(${i * 4}, 100%, 50%)`;
                    ctx.fillRect(x, canvas.height - barHeight, barWidth - 2, barHeight);
                    x += barWidth;
                }
            }

            // 4. Render Text Lyric Dynamic
            renderLyricText();

            animationId = requestAnimationFrame(drawFrame);
        }

        function renderLyricText() {
            const selectedFont = document.getElementById('fontFamily').value;
            const selectedPos = document.getElementById('textPosition').value;
            const audioEl = document.getElementById('audioElement');
            const currentTime = audioEl ? audioEl.currentTime : 0;

            const activeLyric = lyricTimestamps.find(l => currentTime >= l.start && currentTime <= l.end);

            if (activeLyric && activeLyric.text) {
                const fontSize = 28; // Disesuaikan dengan Canvas 480p
                ctx.font = `bold ${fontSize}px ${selectedFont}`;
                ctx.textAlign = "center";

                let textY = canvas.height * 0.82; 
                if (selectedPos === 'center') textY = canvas.height * 0.5;
                if (selectedPos === 'top') textY = canvas.height * 0.2;

                const text = activeLyric.text;
                const textWidth = ctx.measureText(text).width;

                ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
                ctx.fillRect(canvas.width / 2 - textWidth / 2 - 15, textY - fontSize + 4, textWidth + 30, fontSize + 14);

                ctx.strokeStyle = "#000000";
                ctx.lineWidth = 4;
                ctx.strokeText(text, canvas.width / 2, textY);

                ctx.fillStyle = "#facc15";
                ctx.fillText(text, canvas.width / 2, textY);
            }
        }

        drawFrame();

        // --- FUNGSI AI & CHUNKING ---

        async function audioBufferToWav8k(audioBuffer) {
            const targetSampleRate = 8000;
            const numChannels = 1;
            const offlineCtx = new OfflineAudioContext(numChannels, Math.ceil(audioBuffer.duration * targetSampleRate), targetSampleRate);

            const source = offlineCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(offlineCtx.destination);
            source.start(0);

            const renderedBuffer = await offlineCtx.startRendering();
            const pcmData = renderedBuffer.getChannelData(0);

            const wavBuffer = new ArrayBuffer(44 + pcmData.length * 2);
            const view = new DataView(wavBuffer);

            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };

            writeString(0, 'RIFF');
            view.setUint32(4, 36 + pcmData.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, targetSampleRate, true);
            view.setUint32(28, targetSampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.length * 2, true);

            let offset = 44;
            for (let i = 0; i < pcmData.length; i++) {
                const s = Math.max(-1, Math.min(1, pcmData[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                offset += 2;
            }

            return new Blob([wavBuffer], { type: 'audio/wav' });
        }

        async function extractLyricsWithGeminiChunk(audioChunkBlob, chunkStartTime, apiKey) {
            const base64Audio = await new Promise((res) => {
                const reader = new FileReader();
                reader.onloadend = () => res(reader.result.split(',')[1]);
                reader.readAsDataURL(audioChunkBlob);
            });

            const promptText = `Transkripsikan lirik lagu dari audio ini lengkap dengan timestamp waktu mulai dan selesai.
Respons WAJIB berupa JSON ARRAY murni tanpa teks/markdown tambahan:
[
  {"text": "Lirik baris pertama", "start": 0.0, "end": 4.5}
]
Catatan: Akurasikan detik lirik dengan lagu!`;

            const payload = {
                contents: [{
                    parts: [
                        { text: promptText },
                        { inline_data: { mime_type: "audio/wav", data: base64Audio } }
                    ]
                }]
            };

            let attempts = 0;
            while (attempts < 5) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.status === 429) {
                        attempts++;
                        await new Promise(r => setTimeout(r, 4000 * attempts));
                        continue;
                    }

                    const data = await response.json();
                    let responseText = data.candidates[0].content.parts[0].text;
                    responseText = responseText.replace(/```json/g, '').replace(/```/g, '').trim();

                    const parsed = JSON.parse(responseText);
                    return parsed.map(item => ({
                        text: item.text,
                        start: Number(item.start) + chunkStartTime,
                        end: Number(item.end) + chunkStartTime
                    }));
                } catch (e) {
                    attempts++;
                    await new Promise(r => setTimeout(r, 3000));
                }
            }
            return [];
        }

        async function startRenderProcess() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const audioFile = document.getElementById('audioInput').files[0];

            if (!apiKey) return alert('Silakan masukkan Gemini API Key terlebih dahulu.');
            if (!audioFile) return alert('Silakan upload file Audio MP3 terlebih dahulu.');

            const statusArea = document.getElementById('statusArea');
            const statusText = document.getElementById('statusText');
            const progressBar = document.getElementById('progressBar');
            const renderBtn = document.getElementById('renderBtn');

            statusArea.classList.remove('hidden');
            renderBtn.disabled = true;
            renderBtn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                // STEP 1: AI Transkripsi
                statusText.innerText = "⏳ Membaca & mengompresi audio untuk Gemini AI...";
                progressBar.style.width = "10%";

                const audioEl = document.getElementById('audioElement');
                audioEl.src = URL.createObjectURL(audioFile);
                await new Promise((res) => audioEl.onloadedmetadata = () => res());

                const arrayBuffer = await audioFile.arrayBuffer();
                const tempAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const decodedAudio = await tempAudioCtx.decodeAudioData(arrayBuffer);

                const chunkSize = 60;
                const totalChunks = Math.ceil(decodedAudio.duration / chunkSize);
                lyricTimestamps = [];

                for (let i = 0; i < totalChunks; i++) {
                    const startTime = i * chunkSize;
                    const duration = Math.min(chunkSize, decodedAudio.duration - startTime);

                    statusText.innerText = `🤖 Gemini AI sedang menganalisis lirik (Bagian ${i + 1}/${totalChunks})...`;
                    progressBar.style.width = `${10 + Math.floor(((i + 1) / totalChunks) * 40)}%`;

                    const offlineCtx = new OfflineAudioContext(decodedAudio.numberOfChannels, Math.ceil(duration * decodedAudio.sampleRate), decodedAudio.sampleRate);
                    const source = offlineCtx.createBufferSource();
                    source.buffer = decodedAudio;
                    source.connect(offlineCtx.destination);
                    source.start(0, startTime, duration);

                    const chunkBuffer = await offlineCtx.startRendering();
                    const wavBlob = await audioBufferToWav8k(chunkBuffer);
                    const chunkLyrics = await extractLyricsWithGeminiChunk(wavBlob, startTime, apiKey);

                    lyricTimestamps.push(...chunkLyrics);
                }

                // STEP 2: Render Video MP4 Low-Bitrate
                statusText.innerText = "📹 Memulai Perekaman Video MP4 Ringan...";
                progressBar.style.width = "50%";

                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioCtx.createAnalyser();
                    analyser.fftSize = 128;
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                }
                
                const source = audioCtx.createMediaElementSource(audioEl);
                const dest = audioCtx.createMediaStreamDestination();
                source.connect(analyser);
                source.connect(dest);
                source.connect(audioCtx.destination);

                const canvasStream = canvas.captureStream(24); // 24 FPS cukup untuk video lirik & animasi halus
                const combinedStream = new MediaStream([
                    ...canvasStream.getVideoTracks(),
                    ...dest.stream.getAudioTracks()
                ]);

                // PILIH FORMAT MP4 TERBAIK
                const mp4Types = [
                    'video/mp4;codecs=avc1.42E01E,mp4a.40.2',
                    'video/mp4;codecs=h264,aac',
                    'video/mp4',
                    'video/webm;codecs=vp9', // Fallback jika browser sangat lama tak dukung MP4
                    'video/webm'
                ];
                
                const chosenMime = mp4Types.find(type => MediaRecorder.isTypeSupported(type)) || 'video/webm';

                // SETING BITRATE VIDEO HANYA 1.5 Mbps (Supaya file sangat kecil)
                const recorder = new MediaRecorder(combinedStream, { 
                    mimeType: chosenMime,
                    videoBitsPerSecond: 1500000 // 1.5 Mbps limit
                });

                const chunks = [];
                recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };

                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/mp4' }); // Tetap force tipe blob sebagai MP4
                    const videoUrl = URL.createObjectURL(blob);

                    const videoPreview = document.getElementById('videoPreview');
                    const downloadBtn = document.getElementById('downloadBtn');

                    videoPreview.src = videoUrl;
                    downloadBtn.href = videoUrl;
                    downloadBtn.download = `Lyric-Video-${Date.now()}.mp4`;

                    document.getElementById('outputArea').classList.remove('hidden');
                    statusText.innerText = "🎉 Video MP4 ringan berhasil dibuat!";
                    progressBar.style.width = "100%";
                    renderBtn.disabled = false;
                    renderBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                };

                audioEl.play();
                recorder.start();

                audioEl.ontimeupdate = () => {
                    const progressPercent = 50 + ((audioEl.currentTime / audioEl.duration) * 50);
                    progressBar.style.width = `${progressPercent}%`;
                    statusText.innerText = `🎬 Merender Video MP4: ${Math.floor(audioEl.currentTime)}s / ${Math.floor(audioEl.duration)}s`;
                };

                audioEl.onended = () => {
                    recorder.stop();
                };

            } catch (err) {
                console.error(err);
                alert("Terjadi kesalahan: " + err.message);
                renderBtn.disabled = false;
                renderBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
