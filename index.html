<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Music Video Creator</title>
    <!-- Tailwind CSS untuk Interface modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #f4fbf7 0%, #eefaf4 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen py-10 px-4 font-sans text-gray-800">

    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl border border-green-100 overflow-hidden">
        <!-- Header -->
        <div class="p-6 text-center border-b border-gray-100">
            <h1 class="text-3xl font-bold text-green-700 flex justify-center items-center gap-2">
                🌿 AI Music Video Creator
            </h1>
            <p class="text-gray-500 text-sm mt-1">Smart Lightweight Video Generator</p>
        </div>

        <div class="p-6 space-y-6">
            <!-- Input API Key -->
            <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4">
                <label class="block text-sm font-semibold text-yellow-800 mb-1">🔑 Gemini API Key:</label>
                <input type="password" id="apiKey" class="w-full px-4 py-2 border border-yellow-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none text-sm" placeholder="Masukkan Gemini API Key Anda">
                <p class="text-xs text-yellow-700 mt-1">Model yang digunakan: <strong>gemini-2.5-flash</strong></p>
            </div>

            <!-- 1. Upload MP3 -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">🎵 1. Upload File Audio MP3:</label>
                <input type="file" id="audioInput" accept="audio/mp3" class="w-full px-3 py-2 border border-gray-300 rounded-lg file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
            </div>

            <!-- 2. Upload Gambar -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">🖼️ 2. Upload Gambar Background:</label>
                <input type="file" id="imageInput" accept="image/*" class="w-full px-3 py-2 border border-gray-300 rounded-lg file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
            </div>

            <!-- 3. Tempel Lirik -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">📝 3. Tempel Lirik Teks Asli (Berurutan per baris):</label>
                <textarea id="lyricsInput" rows="6" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none text-sm" placeholder="Contoh:&#10;Mari menjaga iman di dada&#10;Belajar tauhid sepanjang masa&#10;Ikhlas beramal karena Allah semata&#10;Menuju surga penuh cahaya"></textarea>
            </div>

            <!-- 4. Format Ukuran Video -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">📐 4. Format Ukuran Video Output:</label>
                <div class="grid grid-cols-2 gap-4">
                    <label class="border-2 border-green-500 rounded-xl p-4 flex flex-col items-center justify-center cursor-pointer hover:bg-green-50 transition" id="labelLandscape">
                        <input type="radio" name="videoFormat" value="landscape" checked class="sr-only" onclick="selectFormat('landscape')">
                        <span class="text-lg">🖥️ Lebar (16:9)</span>
                        <span class="text-xs text-gray-500">YouTube / Desktop</span>
                    </label>
                    <label class="border border-gray-200 rounded-xl p-4 flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50 transition" id="labelPortrait">
                        <input type="radio" name="videoFormat" value="portrait" class="sr-only" onclick="selectFormat('portrait')">
                        <span class="text-lg">📱 Tegak (9:16)</span>
                        <span class="text-xs text-gray-500">Shorts / Reels / TikTok</span>
                    </label>
                </div>
            </div>

            <!-- 5. Efek Tambahan -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">✨ 5. Efek Animasi Overlay tambahan:</label>
                <select id="effectSelect" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-green-500 focus:outline-none text-sm">
                    <option value="none">Tanpa Efek (Polosan)</option>
                </select>
            </div>

            <!-- Area Progress -->
            <div id="statusArea" class="hidden p-4 bg-gray-50 rounded-lg border border-gray-200 text-sm text-gray-600 space-y-2">
                <p id="statusText" class="font-semibold text-green-700">Menunggu proses...</p>
                <div class="w-full bg-gray-200 rounded-full h-2.5">
                    <div id="progressBar" class="bg-green-600 h-2.5 rounded-full" style="width: 0%"></div>
                </div>
            </div>

            <!-- Tombol Render -->
            <button id="renderBtn" onclick="startProcess()" class="w-full py-4 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl shadow-lg transition flex justify-center items-center gap-2 text-lg">
                🚀 Mulaikan Proses Lirik & Render Video
            </button>

            <!-- Preview Hasil Akhir -->
            <div id="outputArea" class="hidden space-y-4 pt-4 border-t border-gray-100">
                <h3 class="text-lg font-bold text-gray-700">Hasil Video:</h3>
                <video id="videoPreview" controls class="w-full rounded-lg shadow-md max-h-[400px] bg-black"></video>
                <a id="downloadBtn" class="block text-center py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-md transition cursor-pointer">
                    ⬇️ Download Video (WebM/MP4)
                </a>
            </div>
        </div>
    </div>

    <!-- Elemen Tersembunyi untuk Proses Renderer -->
    <canvas id="renderCanvas" class="hidden"></canvas>
    <audio id="audioPlayback" class="hidden"></audio>

    <script>
        let selectedFormat = 'landscape';
        let lyricTimestamps = [];

        function selectFormat(format) {
            selectedFormat = format;
            const land = document.getElementById('labelLandscape');
            const port = document.getElementById('labelPortrait');
            if (format === 'landscape') {
                land.className = "border-2 border-green-500 rounded-xl p-4 flex flex-col items-center justify-center cursor-pointer hover:bg-green-50 transition";
                port.className = "border border-gray-200 rounded-xl p-4 flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50 transition";
            } else {
                port.className = "border-2 border-green-500 rounded-xl p-4 flex flex-col items-center justify-center cursor-pointer hover:bg-green-50 transition";
                land.className = "border border-gray-200 rounded-xl p-4 flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50 transition";
            }
        }

        // Fungsi mengubah file audio menjadi Base64 agar bisa dikirim ke Gemini
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    const base64String = reader.result.split(',')[1];
                    resolve(base64String);
                };
                reader.onerror = error => reject(error);
            });
        }

        async function startProcess() {
            const apiKey = document.getElementById('apiKey').value;
            const audioFile = document.getElementById('audioInput').files[0];
            const imageFile = document.getElementById('imageInput').files[0];
            const lyricsText = document.getElementById('lyricsInput').value;

            if (!apiKey) return alert("Silakan masukkan Gemini API Key terlebih dahulu.");
            if (!audioFile) return alert("Silakan unggah file audio MP3.");
            if (!imageFile) return alert("Silakan unggah gambar background.");
            if (!lyricsText.trim()) return alert("Silakan isi teks lirik.");

            const statusArea = document.getElementById('statusArea');
            const statusText = document.getElementById('statusText');
            const progressBar = document.getElementById('progressBar');
            statusArea.classList.remove('hidden');

            try {
                // 1. Dapatkan durasi audio asli
                statusText.innerText = "Membaca file audio...";
                const audioUrl = URL.createObjectURL(audioFile);
                const audio = document.getElementById('audioPlayback');
                audio.src = audioUrl;
                
                await new Promise((resolve) => {
                    audio.onloadedmetadata = () => resolve();
                });
                const duration = audio.duration;

                // 2. Hubungkan ke Gemini AI & kirim suara
                statusText.innerText = "Mengonversi audio untuk dikirim ke Gemini...";
                progressBar.style.width = "20%";
                const audioBase64 = await fileToBase64(audioFile);

                statusText.innerText = "Gemini sedang mendengarkan lagu & mencocokkan lirik (proses analisis suara)...";
                progressBar.style.width = "40%";
                
                try {
                    lyricTimestamps = await getTimestampsFromGemini(apiKey, lyricsText, audioBase64);
                    statusText.innerText = "Sinkronisasi lirik presisi berhasil diselesaikan oleh Gemini 2.5 Flash!";
                } catch (aiError) {
                    console.warn("Gagal sinkronisasi presisi:", aiError.message);
                    statusText.innerText = "Terjadi kendala analisis otomatis. Menggunakan pembagian durasi rata sebagai cadangan...";
                    lyricTimestamps = generateFallbackTimestamps(lyricsText, duration);
                }

                if (!lyricTimestamps || lyricTimestamps.length === 0) {
                    throw new Error("Gagal menyusun data lirik.");
                }

                // 3. Mulai Render Video
                statusText.innerText = "Memulai proses rendering video (silakan tunggu hingga lagu selesai diputar)...";
                progressBar.style.width = "60%";
                await renderAndRecord(audio, imageFile);

            } catch (error) {
                console.error(error);
                statusText.innerText = "Terjadi kesalahan: " + error.message;
                statusText.classList.add('text-red-600');
            }
        }

        // Menggunakan model gemini-2.5-flash pada API versi v1
        async function getTimestampsFromGemini(apiKey, lyrics, audioBase64) {
            const prompt = `Dengarkan file audio yang dilampirkan ini baik-baik. Cocokkan bait per bait dengan lirik lagu yang saya sediakan berikut ini:
"""
${lyrics}
"""

Tugas Anda:
1. Analisis ketukan suara/vokal pada audio.
2. Tentukan waktu mulai (start) dan selesai (end) dalam satuan detik untuk masing-masing baris lirik tersebut agar pas dengan suara penyanyinya.
3. Kembalikan respon HANYA berupa JSON Array objek tanpa komentar tambahan, tanpa tanda petik kode markdown (seperti \`\`\`json):
[
  {"text": "baris lirik pertama", "start": 1.2, "end": 4.5},
  {"text": "baris lirik kedua", "start": 4.6, "end": 8.1}
]`;

            // Diubah menjadi gemini-2.5-flash
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            {
                                inline_data: {
                                    mime_type: "audio/mp3",
                                    data: audioBase64
                                }
                            },
                            {
                                text: prompt
                            }
                        ]
                    }]
                })
            });

            if (!response.ok) {
                const errorBody = await response.json().catch(() => ({}));
                throw new Error(errorBody.error?.message || `HTTP error! status: ${response.status}`);
            }

            const data = await response.json();
            
            if (!data.candidates || data.candidates.length === 0 || !data.candidates[0].content?.parts?.[0]?.text) {
                throw new Error("Respon API kosong.");
            }

            let rawText = data.candidates[0].content.parts[0].text;
            rawText = rawText.replace(/```json/gi, "").replace(/```/g, "").trim();
            return JSON.parse(rawText);
        }

        // Fitur Cadangan Distribusi Lirik Rata jika terjadi kendala API
        function generateFallbackTimestamps(lyrics, duration) {
            const lines = lyrics.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const totalLines = lines.length;
            if (totalLines === 0) return [];

            const durationPerLine = duration / totalLines;
            return lines.map((line, index) => {
                return {
                    text: line,
                    start: index * durationPerLine,
                    end: (index + 1) * durationPerLine
                };
            });
        }

        // Fungsi Render Canvas dan Merekam Video
        function renderAndRecord(audio, imageFile) {
            return new Promise((resolve, reject) => {
                const canvas = document.getElementById('renderCanvas');
                const ctx = canvas.getContext('2d');
                
                if (selectedFormat === 'landscape') {
                    canvas.width = 1280;
                    canvas.height = 720;
                } else {
                    canvas.width = 720;
                    canvas.height = 1280;
                }

                const img = new Image();
                img.src = URL.createObjectURL(imageFile);
                img.onload = () => {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const source = audioCtx.createMediaElementSource(audio);
                    const dest = audioCtx.createMediaStreamDestination();
                    source.connect(dest);
                    source.connect(audioCtx.destination);

                    const canvasStream = canvas.captureStream(30); 
                    const combinedStream = new MediaStream([
                        ...canvasStream.getVideoTracks(),
                        ...dest.stream.getAudioTracks()
                    ]);

                    const recorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm;codecs=vp9' });
                    const chunks = [];

                    recorder.ondataavailable = (e) => {
                        if (e.data.size > 0) chunks.push(e.data);
                    };

                    recorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'video/webm' });
                        const videoUrl = URL.createObjectURL(blob);
                        
                        const videoPreview = document.getElementById('videoPreview');
                        const downloadBtn = document.getElementById('downloadBtn');
                        
                        videoPreview.src = videoUrl;
                        downloadBtn.href = videoUrl;
                        downloadBtn.download = `AI-Music-Video-${Date.now()}.webm`;
                        
                        document.getElementById('outputArea').classList.remove('hidden');
                        document.getElementById('statusText').innerText = "Proses Berhasil! Video telah dibuat.";
                        document.getElementById('progressBar').style.width = "100%";
                        resolve();
                    };

                    audio.play();
                    recorder.start();

                    function drawFrame() {
                        if (audio.paused || audio.ended) {
                            recorder.stop();
                            audioCtx.close();
                            return;
                        }

                        // Menggambar Latar Belakang (Cover Fit)
                        const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                        const x = (canvas.width / 2) - (img.width / 2) * scale;
                        const y = (canvas.height / 2) - (img.height / 2) * scale;
                        ctx.drawImage(img, x, y, img.width * scale, img.height * scale);

                        // Overlay Gelap agar Teks Lirik Kontras
                        ctx.fillStyle = "rgba(0, 0, 0, 0.45)";
                        ctx.fillRect(0, 0, canvas.width, canvas.height);

                        // Membaca Waktu Lagu Berjalan
                        const currentTime = audio.currentTime;
                        const activeLyric = lyricTimestamps.find(l => currentTime >= l.start && currentTime <= l.end);

                        // Gambar Teks Lirik
                        if (activeLyric) {
                            ctx.font = "bold 38px sans-serif";
                            ctx.fillStyle = "#ffffff";
                            ctx.textAlign = "center";
                            ctx.shadowColor = "rgba(0,0,0,0.8)";
                            ctx.shadowBlur = 8;
                            
                            // Letakkan teks di posisi tengah bawah layar
                            ctx.fillText(activeLyric.text, canvas.width / 2, canvas.height * 0.8);
                        }

                        // Perbarui visual progress bar
                        const progressPercent = (currentTime / audio.duration) * 40 + 60;
                        document.getElementById('progressBar').style.width = `${progressPercent}%`;
                        document.getElementById('statusText').innerText = `Merender Frame: ${Math.floor(currentTime)}s / ${Math.floor(audio.duration)}s`;

                        requestAnimationFrame(drawFrame);
                    }

                    drawFrame();
                };
            });
        }
    </script>
</body>
</html>
