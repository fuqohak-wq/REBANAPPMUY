<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Music Video Generator - Gemini 2.5 Flash</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #6366f1;
      --text: #f8fafc;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      max-width: 900px;
      width: 100%;
      background: var(--card);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    h1 { text-align: center; color: #818cf8; margin-top: 0; }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-weight: bold; }
    input, select, button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: var(--text);
      box-sizing: border-box;
    }
    button {
      background: var(--accent);
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }
    button:hover { background: #4f46e5; }
    button:disabled { background: #475569; cursor: not-allowed; }
    
    .preview-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
    }
    canvas {
      background: #000;
      border-radius: 12px;
      max-width: 100%;
      height: auto;
      box-shadow: 0 4px 15px rgba(0,0,0,0.6);
    }
    .status {
      margin-top: 10px;
      font-style: italic;
      color: #94a3b8;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🎵 AI Music Video Creator</h1>
  
  <div class="form-group">
    <label for="apiKey">Gemini API Key:</label>
    <input type="password" id="apiKey" placeholder="Masukkan Gemini API Key Anda...">
  </div>

  <div class="form-group">
    <label for="audioInput">File MP3 Audio:</label>
    <input type="file" id="audioInput" accept="audio/mp3, audio/wav">
  </div>

  <div class="form-group">
    <label for="imageInput">Foto/Gambar Pendukung (Bisa pilih banyak):</label>
    <input type="file" id="imageInput" accept="image/*" multiple>
  </div>

  <div class="form-group">
    <label for="aspectRatio">Format Video Output:</label>
    <select id="aspectRatio">
      <option value="16:9">Memanjang / Landscape 16:9 (YouTube Desktop / TV)</option>
      <option value="9:16">Meninggi / Portrait 9:16 (YouTube Shorts / TikTok / Reels)</option>
    </select>
  </div>

  <button id="processBtn">1. Analisis Lirik dengan Gemini 2.5</button>
  <button id="renderBtn" disabled>2. Putar & Rekam Video</button>
  <button id="downloadBtn" disabled style="background:#10b981;">3. Download Video (.webm)</button>

  <div class="status" id="statusText">Siap memproses...</div>

  <div class="preview-zone">
    <canvas id="videoCanvas"></canvas>
  </div>
</div>

<script>
  let audioBuffer = null;
  let audioContext = null;
  let audioSource = null;
  let analyser = null;
  let lyricsData = [];
  let userImages = [];
  let mediaRecorder = null;
  let recordedChunks = [];

  const canvas = document.getElementById('videoCanvas');
  const ctx = canvas.getContext('2d');
  const statusText = document.getElementById('statusText');

  // Konfigurasi Canvas berdasarkan Aspect Ratio
  function updateCanvasDimensions() {
    const ratio = document.getElementById('aspectRatio').value;
    if (ratio === '16:9') {
      canvas.width = 1280;
      canvas.height = 720;
    } else {
      canvas.width = 720;
      canvas.height = 1280;
    }
  }
  document.getElementById('aspectRatio').addEventListener('change', updateCanvasDimensions);
  updateCanvasDimensions();

  // Load Gambar yang diunggah
  document.getElementById('imageInput').addEventListener('change', (e) => {
    userImages = [];
    const files = e.target.files;
    for (let file of files) {
      const img = new Image();
      img.src = URL.createObjectURL(file);
      userImages.push(img);
    }
  });

  // Convert File ke Base64 untuk dikirim ke Gemini
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = error => reject(error);
      reader.readAsDataURL(file);
    });
  }

  // 1. Panggil Gemini 2.5 Flash API untuk Deteksi Lirik + Timestamp
  document.getElementById('processBtn').addEventListener('click', async () => {
    const apiKey = document.getElementById('apiKey').value;
    const audioFile = document.getElementById('audioInput').files[0];

    if (!apiKey || !audioFile) {
      alert("Harap masukkan API Key dan pilih file audio MP3!");
      return;
    }

    statusText.innerText = "Mengunggah & menganalisis audio dengan Gemini 2.5 Flash...";

    try {
      const base64Audio = await fileToBase64(audioFile);
      
      const prompt = `Analisis file lagu ini dan berikan output dalam format JSON MURNI (tanpa markdown format) berupa array objek lirik berurutan. 
      Format wajib: 
      [
        {"start": 0.0, "end": 4.5, "text": "Baris lirik pertama"},
        {"start": 4.5, "end": 9.0, "text": "Baris lirik kedua"}
      ]
      Wajib berikan timestamp detik start & end yang akurat sesuai lagunya.`;

      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: prompt },
              { inline_data: { mime_type: audioFile.type, data: base64Audio } }
            ]
          }]
        })
      });

      const data = await response.json();
      let rawText = data.candidates[0].content.parts[0].text;
      
      // Sanitasi JSON
      rawText = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
      lyricsData = JSON.parse(rawText);

      statusText.innerText = `Sukses! Berhasil mendeteksi ${lyricsData.length} baris lirik. Siap diputar!`;
      document.getElementById('renderBtn').disabled = false;

      // Prepare Audio Web API
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const arrayBuffer = await audioFile.arrayBuffer();
      audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

    } catch (err) {
      console.error(err);
      statusText.innerText = "Gagal memproses audio/lirik: " + err.message;
    }
  });

  // 2. Render Loop (Animasi Canvas + Visualizer Audio + Text Lirik)
  let startTime = 0;
  let isPlaying = false;

  function renderFrame() {
    if (!isPlaying) return;

    const currentTime = audioContext.currentTime - startTime;
    const duration = audioBuffer.duration;

    if (currentTime > duration) {
      isPlaying = false;
      statusText.innerText = "Selesai memutar dan merekam!";
      document.getElementById('downloadBtn').disabled = false;
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
      return;
    }

    // Clear Canvas
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // --- Efek 1: Background Gambar Berputar / Zoom (Ken Burns Effect) ---
    if (userImages.length > 0) {
      const imgIndex = Math.floor(currentTime / 5) % userImages.length;
      const img = userImages[imgIndex];
      if (img.complete) {
        const scale = 1 + (currentTime % 5) * 0.03; // Smooth Zoom
        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.scale(scale, scale);
        ctx.globalAlpha = 0.6;
        ctx.drawImage(img, -canvas.width/2, -canvas.height/2, canvas.width, canvas.height);
        ctx.restore();
      }
    }

    // --- Efek 2: Audio Visualizer (Irama Musik) ---
    if (analyser) {
      const freqData = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(freqData);

      ctx.fillStyle = 'rgba(99, 102, 241, 0.5)';
      const barWidth = (canvas.width / freqData.length) * 2.5;
      let x = 0;
      for (let i = 0; i < freqData.length; i++) {
        const barHeight = (freqData[i] / 255) * (canvas.height * 0.2);
        ctx.fillRect(x, canvas.height - barHeight, barWidth - 2, barHeight);
        x += barWidth;
      }
    }

    // --- Efek 3: Render Lirik Tepat Sesuai Waktu ---
    const currentLyric = lyricsData.find(l => currentTime >= l.start && currentTime <= l.end);
    if (currentLyric) {
      ctx.fillStyle = '#ffffff';
      ctx.shadowColor = '#6366f1';
      ctx.shadowBlur = 12;
      ctx.font = `bold ${canvas.width * 0.045}px sans-serif`;
      ctx.textAlign = 'center';
      
      // Auto Wrap Text sederhana
      ctx.fillText(currentLyric.text, canvas.width / 2, canvas.height * 0.75);
    }

    requestAnimationFrame(renderFrame);
  }

  // 3. Rekam & Putar Video
  document.getElementById('renderBtn').addEventListener('click', () => {
    if (!audioBuffer) return;

    // Reset Audio & Node
    audioSource = audioContext.createBufferSource();
    audioSource.buffer = audioBuffer;

    analyser = audioContext.createAnalyser();
    analyser.fftSize = 128;

    const dest = audioContext.createMediaStreamDestination();
    audioSource.connect(analyser);
    analyser.connect(audioContext.destination);
    analyser.connect(dest);

    // Gabungkan Stream Canvas & Stream Audio untuk Rekaman
    const canvasStream = canvas.captureStream(30); // 30 FPS
    const combinedStream = new MediaStream([
      ...canvasStream.getVideoTracks(),
      ...dest.stream.getAudioTracks()
    ]);

    recordedChunks = [];
    mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };

    mediaRecorder.start();
    audioSource.start(0);
    startTime = audioContext.currentTime;
    isPlaying = true;

    statusText.innerText = "Sedang membuat video & merekam... Jangan tutup tab ini.";
    renderFrame();
  });

  // 4. Download File Video (.webm)
  document.getElementById('downloadBtn').addEventListener('click', () => {
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `music-video-${document.getElementById('aspectRatio').value.replace(':','-')}.webm`;
    a.click();
  });
</script>

</body>
</html>
